    // Helper: write ECEF -> scene into "out"
    function ecefToScene(out, x, y, z, rotY) {
        // Swap Y/Z for scene, rotate around Y, scale to scene units.
        return ecfToSceneVector(out, { x, y, z }, rotY);
    }

    function sceneToEcefKm(sceneVec, rotY) {
        // Inverse of ecefToScene: rotate back, un-swap axes, convert to km
        const unrotated = V_TMP4.copy(sceneVec)
            .multiplyScalar(SCENE_TO_KM)
            .applyAxisAngle(AXIS_Y, -rotY);

        return {
            x: unrotated.x,
            y: unrotated.z,
            z: unrotated.y
        };
    }

    function cartesianToLatLonDeg(vec) {
        const { x, y, z } = vec;
        const r = Math.sqrt(x * x + y * y + z * z);
        if (r === 0) return null;

        const latDeg = Math.asin(z / r) * R2D;
        const lonDeg = Math.atan2(y, x) * R2D;
        return { latDeg, lonDeg };
    }

    function normalizeOrbitSelection(selection) {
        const values = Array.isArray(selection) ? selection : [selection];
        const cleaned = values
            .filter(Boolean)
            .map(value => value.toString().trim().toUpperCase());

        if (cleaned.includes(ORBIT_ALL_OPTION)) {
            return [...ORBIT_CATEGORY_OPTIONS];
        }

        return Array.from(new Set(cleaned.filter(value => ORBIT_CATEGORY_OPTIONS.includes(value))));
    }

    function isAllOrbitSelection(selection) {
        const normalized = normalizeOrbitSelection(selection);
        return normalized.length === ORBIT_CATEGORY_OPTIONS.length &&
            ORBIT_CATEGORY_OPTIONS.every(value => normalized.includes(value));
    }

    function getOrbitSelectionFromUI() {
        if (!orbitTypeFilterSelect) return [...DEFAULT_ORBIT_FILTER];
        return Array.from(
            orbitTypeFilterSelect.querySelectorAll('button[data-orbit-filter][aria-pressed="true"]')
        ).map(button => button.dataset.orbitFilter);
    }

    function applyOrbitSelectionToUI(selection) {
        const normalized = normalizeOrbitSelection(selection);
        simParams.orbitTypeFilter = normalized;

        if (!orbitTypeFilterSelect) return;
        const isAllSelected = isAllOrbitSelection(normalized);
        orbitTypeFilterSelect.querySelectorAll('button[data-orbit-filter]').forEach(button => {
            const value = button.dataset.orbitFilter;
            const isActive = value === ORBIT_ALL_OPTION
                ? isAllSelected
                : normalized.includes(value);
            button.classList.toggle('is-active', isActive);
            button.setAttribute('aria-pressed', isActive ? 'true' : 'false');
        });
    }

    function normalizeCompanySelection(selection) {
        const cleaned = Array.from(new Set((selection || [])
            .filter(Boolean)
            .filter(value => !EXCLUDED_COMPANY_FILTER_OPTIONS.has(value.toString().trim().toUpperCase()))));

        if (cleaned.includes(ALL_COMPANY_OPTION) && cleaned.length > 1) {
            return cleaned.filter(val => val !== ALL_COMPANY_OPTION);
        }
        if (cleaned.length === 0) {
            return [ALL_COMPANY_OPTION];
        }
        return cleaned;
    }

    function getCompanySelectionFromUI() {
        if (!companyFilterSelect) return [...DEFAULT_COMPANY_FILTER];
        return Array.from(
            companyFilterSelect.querySelectorAll('input[type="checkbox"]:checked')

    function applyCompanySelectionToUI(selection) {
        if (!companyFilterSelect) return;
        const normalized = normalizeCompanySelection(selection);
        companyFilterSelect.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.checked = normalized.includes(cb.value);
        });
        simParams.companyFilter = normalized;
    }

    function formatCompanyLabel(companyName) {
        if (COMPANY_LABEL_OVERRIDES[companyName]) return COMPANY_LABEL_OVERRIDES[companyName];
        return companyName
            .toLowerCase()
            .split(/[-_\s]+/)
            .filter(Boolean)
            .map(part => part.charAt(0).toUpperCase() + part.slice(1))
            .join(' ');
    }

    function createCompanyCheckbox(value, labelText) {
        const label = document.createElement('label');
        label.className = 'filter-chip';

        const input = document.createElement('input');
        input.type = 'checkbox';
        input.value = value;
        input.name = 'tagFilter';
        input.setAttribute('aria-label', labelText);

        const textSpan = document.createElement('span');
        textSpan.textContent = labelText;

        label.appendChild(input);
        label.appendChild(textSpan);

        return label;
    }

    function renderCompanyFilter(companies, previousSelection = simParams.companyFilter) {
        if (!companyFilterSelect) return;

        const normalizedSelection = normalizeCompanySelection(previousSelection);
        companyFilterSelect.innerHTML = '';

        const options = [ALL_COMPANY_OPTION, ...companies];
        options.forEach(companyName => {
            const checkbox = createCompanyCheckbox(companyName, formatCompanyLabel(companyName));
            companyFilterSelect.appendChild(checkbox);
        });

        applyCompanySelectionToUI(normalizedSelection);
    }

    function companyMatchesSelection(company) {
        const selection = normalizeCompanySelection(simParams.companyFilter);
        return selection.includes(ALL_COMPANY_OPTION) || selection.includes(company);
    }

    function orbitMatchesSelection(orbitType, selection = simParams.orbitTypeFilter) {
        const normalized = normalizeOrbitSelection(selection);
        if (normalized.length === 0) return true;

        const type = (orbitType || "N/A").toString().trim().toUpperCase();
        if (normalized.includes(type)) return true;

        const isKnownOrbit = ORBIT_CATEGORY_OPTIONS
            .filter(value => value !== ORBIT_OTHER_OPTION)
            .includes(type);
        return normalized.includes(ORBIT_OTHER_OPTION) && !isKnownOrbit;
    }

    function isDebrisSatellite(satData) {
        const text = [satData?.satellite_name, satData?.company]
            .filter(Boolean)
            .join(' ')
            .toUpperCase();

        return /\b(DEB|DEBRIS)\b/.test(text) ||
            /\bR\/B\b/.test(text) ||
            /\bROCKET BODY\b/.test(text) ||
            /\bSTAGE\b/.test(text);
    }

    function debrisMatchesSelection(satData, mode = simParams.debrisFilter) {
        if (mode === DEBRIS_FILTER_HIDE) return !isDebrisSatellite(satData);
        if (mode === DEBRIS_FILTER_ONLY) return isDebrisSatellite(satData);
        return true;
    }

    function applyDebrisFilterToUI(mode) {
        simParams.debrisFilter = [DEBRIS_FILTER_HIDE, DEBRIS_FILTER_ONLY].includes(mode)

            : DEBRIS_FILTER_SHOW;

        debrisFilterSelect.querySelectorAll('button[data-debris-filter]').forEach(button => {
            const isActive = button.dataset.debrisFilter === simParams.debrisFilter;
            button.classList.toggle('is-active', isActive);
            button.setAttribute('aria-pressed', isActive ? 'true' : 'false');
        });
    }

    function getCompaniesForOrbitSelection(orbitSelection) {
        if (!satellites) return [];

        return Array.from(new Set(
            satellites
                .filter(s => orbitMatchesSelection(s.orbitType, orbitSelection) &&
                    debrisMatchesSelection(s) &&
                    s.company &&
                    s.company !== "N/A" &&
                    !EXCLUDED_COMPANY_FILTER_OPTIONS.has(s.company.toString().trim().toUpperCase()))
                .map(s => s.company)
        )).sort();
    }

        const control = document.getElementById(id);

            labelText.textContent = text;
        } else {

    function scheduleDeferredStartupWork() {
        if (deferredStartupWorkScheduled) return;
        deferredStartupWorkScheduled = true;

        setTimelineButtonState('launchTimelineToggle', 'Preparing Launch Timeline...', true);
        setTimelineButtonState('reentryTimelineToggle', 'Preparing Re-entry Timeline...', true);

        scheduleDeferredWork(() => {
            initializeLaunchTimelineDeferred();
        }, { timeout: 1000 });

        scheduleDeferredWork(() => {
            initializeReentryTimelineDeferred().catch((err) => {
                console.error('Deferred re-entry timeline initialization failed:', err);
                setTimelineButtonState('reentryTimelineToggle', 'Re-entry Timeline Unavailable', true);
            });
        }, { timeout: 2000 });
    }

    function initializeLaunchTimelineDeferred() {
        if (launchTimelineInitialized || launchTimelineInitializing) return;
        launchTimelineInitializing = true;
        startupPerf.mark('launch-timeline-init-start');
        try {
            launchTimelineHandle = initTimeline(satellites, handleTimelineSelection);
            launchTimelineInitialized = true;
            setTimelineButtonState('launchTimelineToggle', 'Show Launch Timeline', false);
            startupPerf.mark('launch-timeline-ready', { count: satellites.length });
        } finally {
            launchTimelineInitializing = false;
        }
    }

    async function initializeReentryTimelineDeferred() {
        if (reentryTimelineHandle || reentryTimelineInitializing) return;
        reentryTimelineInitializing = true;
        try {
            startupPerf.mark('decay-data-load-start');
            const confirmedDecays = await loadConfirmedDecays();
            startupPerf.mark('decay-data-ready', { confirmed: confirmedDecays?.size || 0 });
            startupPerf.mark('decay-estimates-start', { count: satellites.length });

            const estimateDate = new Date();
            let lastProgressUpdate = 0;
            await processInChunks(
                satellites,
                (sat) => {
                    computeDecayEstimates([sat], { confirmedDecays, now: estimateDate });
                },
                {
                    chunkSize: DECAY_ESTIMATE_CHUNK_SIZE,
                    afterChunk: ({ processed, total }) => {
                        const now = performance.now();
                        if (now - lastProgressUpdate > 500 || processed === total) {
                            lastProgressUpdate = now;
                            setTimelineButtonState(
                                'reentryTimelineToggle',
                                `Preparing Re-entry Timeline ${processed}/${total}`,
                                true
                            );
                        }
                    }
                }
            );

            startupPerf.mark('decay-estimates-ready', { count: satellites.length });
            reentryTimelineHandle = initReentryTimeline(satellites, handleTimelineSelection);
            if (reentryTimelineHandle?.refreshData) {
                reentryTimelineHandle.refreshData();
            }
            setTimelineButtonState('reentryTimelineToggle', 'Show Re-entry Timeline', false);
            startupPerf.mark('reentry-timeline-ready', { count: satellites.length });
            startupPerf.logSummary();
        } finally {
            reentryTimelineInitializing = false;
        }
    }

    function buildFilteredSatellitesBySelection() {
        const seenNoradIds = new Set();
        const filtered = [];

        satellites.forEach((s) => {
            const matchesOrbit = orbitMatchesSelection(s.orbitType);
            const matchesCompany = companyMatchesSelection(s.company);
            const matchesDebris = debrisMatchesSelection(s);

            if (!matchesOrbit || !matchesCompany || !matchesDebris) return;

            const noradKey = s.norad_id?.toString();
            if (!noradKey) return;

            const isCurrentSelection = currentSelectedSatellite && currentSelectedSatellite.norad_id?.toString() === noradKey;

            if (!seenNoradIds.has(noradKey)) {
                seenNoradIds.add(noradKey);
                filtered.push(s);
            } else if (isCurrentSelection && !filtered.some(f => f.norad_id?.toString() === noradKey)) {
                // Ensure the currently selected satellite remains the representative for its NORAD id
                filtered.push(s);
            }
        });

        return filtered;
    }

    function positionSatelliteSearchResults() {
        if (!satelliteSearchInput || !satelliteSearchResults || satelliteSearchResults.hidden) return;
        const rect = satelliteSearchInput.getBoundingClientRect();
        const viewportPadding = 10;
        const availableBelow = window.innerHeight - rect.bottom - viewportPadding;
        const availableAbove = rect.top - viewportPadding;
        const openAbove = availableBelow < 150 && availableAbove > availableBelow;
        const availableHeight = Math.max(120, Math.min(260, openAbove ? availableAbove : availableBelow));
        const width = Math.min(rect.width, window.innerWidth - viewportPadding * 2);
        const left = Math.min(
            Math.max(rect.left, viewportPadding),
            Math.max(viewportPadding, window.innerWidth - width - viewportPadding)
        );
        const top = openAbove
            ? Math.max(viewportPadding, rect.top - availableHeight - 4)
            : Math.min(rect.bottom + 4, window.innerHeight - viewportPadding - 44);

        satelliteSearchResults.style.position = 'fixed';
        satelliteSearchResults.style.left = `${left}px`;
        satelliteSearchResults.style.top = `${top}px`;
        satelliteSearchResults.style.width = `${width}px`;
        satelliteSearchResults.style.maxHeight = `${availableHeight}px`;
        satelliteSearchResults.dataset.placement = openAbove ? 'above' : 'below';
    }

    function renderSatelliteSearchResults(filteredTLEs = buildFilteredSatellitesBySelection(), forceOpen = false) {
        if (!satelliteSearchInput || !satelliteSearchResults) return;
        if (forceOpen) isSatelliteDropdownOpen = true;

        const query = satelliteSearchInput.value.trim().toLowerCase();
        const matches = query
            ? filteredTLEs.filter(s => satelliteSearchText(s).includes(query))
            : filteredTLEs.slice(0, Math.min(12, SATELLITE_SEARCH_LIMIT));

        currentSearchResults = matches.slice(0, SATELLITE_SEARCH_LIMIT);
        if (activeSearchResultIndex >= currentSearchResults.length) activeSearchResultIndex = currentSearchResults.length - 1;
        if (activeSearchResultIndex < -1) activeSearchResultIndex = -1;

        satelliteSearchResults.innerHTML = '';
        currentSearchResults.forEach((sat, index) => {
            const item = document.createElement('li');
            item.id = `satelliteSearchOption-${index}`;
            item.className = `satellite-search-option${index === activeSearchResultIndex ? ' is-active' : ''}`;
            item.setAttribute('role', 'option');
            item.setAttribute('aria-selected', index === activeSearchResultIndex ? 'true' : 'false');
            item.dataset.noradId = sat.norad_id;
            const title = document.createElement('strong');
            title.textContent = satelliteSearchLabel(sat);
            const meta = document.createElement('small');
            meta.textContent = `NORAD ${sat.norad_id || 'N/A'} | ${sat.orbitType || 'N/A'} | ${sat.company || 'N/A'}`;
            item.append(title, meta);
            item.addEventListener('mousedown', (event) => {
                event.preventDefault();
                selectSatelliteFromSearch(index);
            });
            satelliteSearchResults.appendChild(item);
        });

        const hasResults = currentSearchResults.length > 0;
        const shouldOpen = hasResults && isSatelliteDropdownOpen;
        satelliteSearchResults.hidden = !hasResults || !shouldOpen;
        if (!satelliteSearchResults.hidden) positionSatelliteSearchResults();
        satelliteSearchInput.setAttribute('aria-expanded', !satelliteSearchResults.hidden ? 'true' : 'false');
        if (activeSearchResultIndex >= 0 && !satelliteSearchResults.hidden) {
            satelliteSearchInput.setAttribute('aria-activedescendant', `satelliteSearchOption-${activeSearchResultIndex}`);
        } else {
            satelliteSearchInput.removeAttribute('aria-activedescendant');
        }
        if (satelliteSearchEmpty) {
            satelliteSearchEmpty.hidden = !(query.length > 0 && !hasResults);
        }
    }

    function satelliteDetailRows(satData) {
        if (!satData) return [];
        const meta = satData.meta ?? {};
        const rows = [
            ['Name', satData.satellite_name ?? satData.name],
            ['NORAD ID', satData.norad_id ?? meta.norad_id],
            ['Orbit type', satData.orbitType ?? satData.type ?? meta.orbital_slot?.nominal],
            ['Tag / company', satData.company ?? satData.operator ?? meta.operator ?? meta.manufacturer],
            ['Launch date', satData.launch_date ?? meta.launch_date],
            ['Object type', satData.object_type ?? satData.type ?? meta.object_type],
            ['App satellite id', satData.satellite_id ?? satData.satelliteId ?? satData.id ?? meta.satellite_id ?? meta.satelliteId ?? meta.id]
        ];
        const seen = new Set(rows.map(([label]) => label.toLowerCase()));
        const addScalarRows = (source, prefix = '') => {
            Object.entries(source || {}).forEach(([key, value]) => {
                if (value === undefined || value === null || value === '' || typeof value === 'object') return;
                if (isDuplicateSelectedDetailKey(key)) return;
                const label = prefix ? `${prefix}.${key}` : key;
                const normalized = label.toLowerCase();
                if (seen.has(normalized)) return;
                seen.add(normalized);
                rows.push([label, value]);
            });
        };
        addScalarRows(satData);
        addScalarRows(meta, 'meta');
        return rows.filter(([, value]) => formatSatelliteDetailValue(value));
    }

    function selectedSatelliteModelSourceDetail(satData) {
        if (!satData) return null;
        const modelResolution = resolveSatelliteModel(satData);
        const assetId = String(modelResolution?.assetId || '').toLowerCase();

        if (modelResolution?.found && (
            assetId.includes('starlink') ||
            metadataId.includes('starlink') ||
            isStarlinkSatelliteData(satData)
        )) {
            return 'Model downloaded from https://sketchfab.com/malacodart, license: CC Attribution / Creative Commons Attribution.';
        }
        if (modelResolution?.found && (
            assetId === ISS_MODEL_ASSET_ID.toLowerCase() ||
            metadataId === 'iss' ||
            isIssSatelliteData(satData)
        )) {
            return 'Model downloaded from https://github.com/nasa/NASA-3D-Resources, courtesy: NASA (National Aeronautics and Space Administration).';
        }
        return null;
    }

    async function checkAndLoadServerTleData() {
        setServerConnectionState({
            state: 'checking',
            connected: false,
            dataSource: 'checking server',
            error: null
        });

        const connection = await checkServerConnection({ baseUrl: serverConnectionState.baseUrl });
        if (!connection.connected) {
            console.info('[server] Python server unavailable. Using local satellite data.', connection.error);
            setServerConnectionState({
                ...connection,
                dataSource: 'local files'
            });
            return null;
        }

        setServerConnectionState({
            ...connection,
            dataSource: 'loading server data'
        });

        try {
            const tleData = await loadTleDataFromServer({ baseUrl: connection.baseUrl });
            console.info(`[server] Loaded ${tleData.length} TLE records from Python server.`);
            setServerConnectionState({
                state: 'connected',
                connected: true,
                baseUrl: connection.baseUrl,
                version: connection.version,
                dataSource: 'live server',
                lastSync: new Date(),
                error: null
            });
            return tleData;
        } catch (err) {
            console.warn('[server] Server TLE data failed validation or loading. Falling back to local data.', err);
            setServerConnectionState({
                state: 'error',
                connected: false,
                baseUrl: connection.baseUrl,
                version: connection.version,
                dataSource: 'local files',
                error: err?.message || String(err)
            });
            return null;
        }
    }

    function activeShareCanvas() {
        if (!simParams.view3D && simParams.viewMercator && mercatorCanvasElement) {
            return { canvas: mercatorCanvasElement, label: 'Mercator canvas' };
        }
        if (renderer?.domElement && simParams.view3D) {
            return { canvas: renderer.domElement, label: '3D globe canvas' };
        }
        if (mercatorCanvasElement && simParams.viewMercator) {
            return { canvas: mercatorCanvasElement, label: 'Mercator canvas' };
        }
        return { canvas: renderer?.domElement || mercatorCanvasElement || null, label: 'current canvas' };
    }

    function canvasToBlob(canvas) {
        return new Promise((resolve, reject) => {
            if (!canvas?.toBlob) {
                reject(new Error('Canvas image capture is not supported by this browser.'));
                return;
            }
            try {
                canvas.toBlob((blob) => {
                    if (blob) resolve(blob);
                    else reject(new Error('Canvas image capture returned no image data.'));
                }, 'image/png');
            } catch (err) {
                reject(err);
            }
        });
    }

    async function captureShareImage() {
        if (shareFeedback) shareFeedback.textContent = 'Capturing canvas image...';
        await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));

        const { canvas, label } = activeShareCanvas();
        if (!canvas) {
            throw new Error('No visible canvas is available to capture.');
        }
        const blob = await canvasToBlob(canvas);
        latestShareImageBlob = blob;
        if (latestShareImageUrl) URL.revokeObjectURL(latestShareImageUrl);
        latestShareImageUrl = URL.createObjectURL(blob);
        if (shareImagePreview) {
            shareImagePreview.src = latestShareImageUrl;
            shareImagePreview.hidden = false;
        }
        if (shareImagePlaceholder) shareImagePlaceholder.hidden = true;
        if (shareFeedback) shareFeedback.textContent = `Captured ${label}.`;
        refreshShareControls();
        return blob;
    }

    async function previewCurrentShareImage() {
        try {
            await captureShareImage();
        } catch (err) {
            latestShareImageBlob = null;
            if (shareFeedback) {
                shareFeedback.textContent =
                    `Canvas image capture is unavailable: ${err?.message || err}. Link sharing still works.`;
            }
            refreshShareControls();
        }
    }

    async function downloadCurrentShareImage() {
        try {
            const blob = latestShareImageBlob || await captureShareImage();
            const url = latestShareImageUrl || URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `openbexi-earth-orbit-${new Date().toISOString().replace(/[:.]/g, '-')}.png`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            if (shareFeedback) shareFeedback.textContent = 'Canvas image download started.';
        } catch (err) {
            if (shareFeedback) {
                shareFeedback.textContent =
                    `Download image failed: ${err?.message || err}. Link sharing still works.`;
            }
        }
    }

    async function copyCurrentShareImage() {
        const clipboardImageSupported = typeof ClipboardItem !== 'undefined' && !!navigator.clipboard?.write;
        if (!clipboardImageSupported) {
            if (shareFeedback) shareFeedback.textContent = 'Copy Image is not supported by this browser.';
            return;
        }
        try {
            const blob = latestShareImageBlob || await captureShareImage();
            await navigator.clipboard.write([
                new ClipboardItem({ [blob.type || 'image/png']: blob })
            ]);
            if (shareFeedback) shareFeedback.textContent = 'Canvas image copied.';
            refreshShareControls();
        } catch (err) {
            if (shareFeedback) {
                shareFeedback.textContent =
                    `Copy image failed: ${err?.message || err}. Link sharing still works.`;
            }
        }
    }

    function resolveMarsTextureLoadingElements() {
        if (!marsTextureLoadingElement) {
            marsTextureLoadingElement = document.getElementById('marsTextureLoading');

    function setMarsTextureLoadingState(state, progressPct = 0) {
        const panel = resolveMarsTextureLoadingElements();
        if (!panel) return;

        if (marsTextureLoadingHideTimer) {
            clearTimeout(marsTextureLoadingHideTimer);
            marsTextureLoadingHideTimer = null;
        }

        const pct = Math.max(0, Math.min(100, Math.round(progressPct)));
        panel.hidden = false;
        panel.classList.toggle('is-error', state === 'error');
        if (marsTextureProgressFillElement) marsTextureProgressFillElement.style.width = `${pct}%`;
        if (marsTextureProgressTextElement) marsTextureProgressTextElement.textContent = `${pct}%`;

        if (state === 'loading') {
            if (!marsTextureLoadingStartedAt) marsTextureLoadingStartedAt = performance.now();
            if (marsTextureLoadingLabelElement) marsTextureLoadingLabelElement.textContent = 'Loading Mars map/texture...';
        } else if (state === 'complete') {
            if (marsTextureLoadingLabelElement) marsTextureLoadingLabelElement.textContent = 'Mars map/texture loaded';
            const elapsedMs = marsTextureLoadingStartedAt ? performance.now() - marsTextureLoadingStartedAt : 0;
            const hideDelayMs = Math.max(900, MARS_TEXTURE_LOADING_MIN_VISIBLE_MS - elapsedMs);
            marsTextureLoadingHideTimer = setTimeout(() => {
                panel.hidden = true;
                marsTextureLoadingStartedAt = 0;
            }, hideDelayMs);
        } else if (state === 'error') {
            if (marsTextureLoadingLabelElement) {
                marsTextureLoadingLabelElement.textContent = 'Mars texture failed to load. Using fallback Mars color.';
            }
            const elapsedMs = marsTextureLoadingStartedAt ? performance.now() - marsTextureLoadingStartedAt : 0;
            const hideDelayMs = Math.max(5000, MARS_TEXTURE_LOADING_MIN_VISIBLE_MS - elapsedMs);
            marsTextureLoadingHideTimer = setTimeout(() => {
                panel.hidden = true;
                marsTextureLoadingStartedAt = 0;
            }, hideDelayMs);
        }
    }

        if (marsTextureLoadingHideTimer) {
            clearTimeout(marsTextureLoadingHideTimer);
            marsTextureLoadingHideTimer = null;
        }
        panel.hidden = true;
        marsTextureLoadingStartedAt = 0;

        const textureToLoad = simParams.useHighDefTexture ? earthConfig.texture : earthConfig.textureLight;
        if (!textureToLoad) {
            earthMesh.material.map = null;

        textureLoader.load(

                earthMesh.material.map = texture;
                earthMesh.material.color.set(0xffffff);
                earthMesh.material.needsUpdate = true;
            },

                textureLoader.load(placeholderUrl, (fallbackMap) => {

                    earthMesh.material.needsUpdate = true;
                });

        );

    function createMilkyWayFallbackTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 2048;
        canvas.height = 1024;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#02040c';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < 7200; i++) {
            const x = Math.abs((Math.sin(i * 12.9898) * 43758.5453) % 1) * canvas.width;
            const y = Math.abs((Math.sin(i * 78.233) * 23454.123) % 1) * canvas.height;
            const alpha = 0.07 + ((i % 17) / 17) * 0.28;
            ctx.fillStyle = `rgba(220, 235, 255, ${alpha})`;
            ctx.fillRect(x, y, 1, 1);
        }

        ctx.save();
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.rotate(-0.16);
        for (let band = 0; band < 10; band++) {
            const width = 70 + band * 28;
            const alpha = 0.13 - band * 0.008;
            const gradient = ctx.createLinearGradient(-canvas.width / 2, -width, canvas.width / 2, width);
            gradient.addColorStop(0, `rgba(74, 112, 170, ${alpha * 0.38})`);
            gradient.addColorStop(0.45, `rgba(205, 220, 255, ${alpha})`);
            gradient.addColorStop(0.55, `rgba(255, 218, 166, ${alpha * 0.72})`);
            gradient.addColorStop(1, `rgba(54, 80, 140, ${alpha * 0.38})`);
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.ellipse(0, 0, canvas.width * 0.58, width, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();

        const texture = new THREE.CanvasTexture(canvas);
        texture.colorSpace = THREE.SRGBColorSpace;
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.ClampToEdgeWrapping;
        return texture;
    }

    function createIntegratedStarMaterial() {
        return new THREE.ShaderMaterial({
            transparent: true,
            depthWrite: false,
            depthTest: true,
            blending: THREE.AdditiveBlending,
            vertexColors: true,
            uniforms: {
                opacityScale: { value: 1.0 }
            },
            vertexShader: `
                attribute float pointSize;
                attribute float alpha;
                varying vec3 vColor;
                varying float vAlpha;
                void main() {
                    vColor = color;
                    vAlpha = alpha;
                    gl_PointSize = pointSize;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float opacityScale;
                varying vec3 vColor;
                varying float vAlpha;
                void main() {
                    vec2 uv = gl_PointCoord - vec2(0.5);
                    float d = length(uv);
                    float alpha = smoothstep(0.5, 0.0, d) * vAlpha * opacityScale;
                    gl_FragColor = vec4(vColor, alpha);
                }
            `
        });
    }

    function createStarTextSprite(text) {
        const canvas = document.createElement('canvas');
        canvas.width = STAR_LABEL_CANVAS_WIDTH;
        canvas.height = STAR_LABEL_CANVAS_HEIGHT;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'rgba(3, 8, 18, 0.72)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = `bold ${STAR_LABEL_FONT_PX}px Trebuchet MS, Segoe UI, sans-serif`;
        ctx.textBaseline = 'middle';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.9)';
        ctx.lineWidth = 10;
        ctx.strokeText(text, 34, canvas.height / 2 + 2);
        ctx.fillStyle = '#dff4ff';
        ctx.fillText(text, 34, canvas.height / 2 + 2);
        const texture = new THREE.CanvasTexture(canvas);
        texture.colorSpace = THREE.SRGBColorSpace;
        texture.minFilter = THREE.LinearFilter;
        texture.magFilter = THREE.LinearFilter;
        texture.generateMipmaps = false;
        const material = new THREE.SpriteMaterial({
            map: texture,
            transparent: true,
            depthWrite: false,
            depthTest: true
        });
        const sprite = new THREE.Sprite(material);
        const labelHeight = STAR_SKY_RADIUS * STAR_LABEL_WORLD_HEIGHT_FACTOR;
        sprite.scale.set(labelHeight * (canvas.width / canvas.height), labelHeight, 1);
        return sprite;
    }

    function updateBrightStarLabels() {
        if (brightStarLabelGroup) {
            brightStarLabelGroup.traverse(obj => {
                if (obj.material?.map) obj.material.map.dispose();
                if (obj.material) obj.material.dispose();
            });
            scene.remove(brightStarLabelGroup);
        }

        brightStarLabelGroup = new THREE.Group();
        BRIGHT_STARS_DEMO
            .filter(star => star.mag < STAR_LABEL_MAGNITUDE_LIMIT)
            .forEach(star => {
                const p = raDecToCartesian({
                    raHours: star.raHours,
                    raDeg: star.raDeg,
                    decDeg: star.decDeg,
                    radius: STAR_LABEL_RADIUS
                });
                const sprite = createStarTextSprite(star.name);
                sprite.position.set(p.x, p.y, p.z);
                brightStarLabelGroup.add(sprite);
            });
        brightStarLabelGroup.name = 'Bright Star Labels';
        scene.add(brightStarLabelGroup);
        updateStarSkyVisibility();
    }

    function updateBundledStarField() {
        if (!scene) return;
        const starData = buildStarBufferData(BRIGHT_STARS_DEMO, {
            radius: STAR_SKY_RADIUS,
            magnitudeLimit: Number.POSITIVE_INFINITY,
            colorMode: 'color'
        });
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(starData.positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(starData.colors, 3));
        geometry.setAttribute('pointSize', new THREE.BufferAttribute(starData.sizes, 1));
        geometry.setAttribute('alpha', new THREE.BufferAttribute(starData.alphas, 1));

        if (!starMaterial) starMaterial = createIntegratedStarMaterial();
        if (starPoints) {
            starPoints.geometry.dispose();
            starPoints.geometry = geometry;
        } else {
            starPoints = new THREE.Points(geometry, starMaterial);
            starPoints.name = 'Stars and Milky Way real RA Dec star field';
            starPoints.renderOrder = -20;
            scene.add(starPoints);
        }
        starPoints.userData.visibleStarCount = starData.stars.length;
        updateStarCatalogSummaryVisibility();
        updateBrightStarLabels();
        updateStarSkyVisibility();
    }

    function makeRaDecGridLine(points, color = 0x476f9c) {
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        const material = new THREE.LineBasicMaterial({
            color,
            transparent: true,
            opacity: 0.28,
            depthWrite: false,
            depthTest: true
        });
        return new THREE.Line(geometry, material);
    }

    function createRaDecGrid() {
        raDecGrid = new THREE.Group();
        raDecGrid.name = 'RA Dec Grid';
        const radius = STAR_SKY_RADIUS * 0.985;
        for (let dec = -60; dec <= 60; dec += 30) {
            const points = [];
            for (let ra = 0; ra <= 360; ra += 3) {
                const p = raDecToCartesian({ raDeg: ra, decDeg: dec, radius });
                points.push(new THREE.Vector3(p.x, p.y, p.z));
            }
            raDecGrid.add(makeRaDecGridLine(points, dec === 0 ? 0x77a8d8 : 0x476f9c));
        }
        for (let ra = 0; ra < 360; ra += 30) {
            const points = [];
            for (let dec = -90; dec <= 90; dec += 3) {
                const p = raDecToCartesian({ raDeg: ra, decDeg: dec, radius });
                points.push(new THREE.Vector3(p.x, p.y, p.z));
            }
            raDecGrid.add(makeRaDecGridLine(points));
        }
        scene.add(raDecGrid);
    }

    function createStarAtmosphere() {
        const material = new THREE.ShaderMaterial({
            transparent: true,
            depthWrite: false,
            side: THREE.BackSide,
            blending: THREE.AdditiveBlending,
            uniforms: {
                glowColor: { value: new THREE.Color(0x78c7ff) }
            },
            vertexShader: `
                varying vec3 vNormal;
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform vec3 glowColor;
                varying vec3 vNormal;
                void main() {
                    float intensity = pow(0.62 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.4);
                    gl_FragColor = vec4(glowColor, clamp(intensity, 0.0, 0.48));
                }
            `
        });
        starAtmosphereMesh = new THREE.Mesh(
            new THREE.SphereGeometry(EARTH_SCENE_RADIUS * 1.045, 96, 64),
            material
        );
        starAtmosphereMesh.name = 'Stars and Milky Way optional atmosphere';
        scene.add(starAtmosphereMesh);
    }

    function restoreSolarSystemPreviousState() {
        const previous = solarSystemPreviousState;
        if (!previous) return;
        simParams.view3D = previous.view3D;
        simParams.viewMercator = previous.viewMercator;
        simParams.otherSelection = previous.otherSelection;
        simParams.showOrbit = previous.showOrbit;
        simParams.showOrbitFrame = previous.showOrbitFrame;
        simParams.showYPR = previous.showYPR;
        simParams.showFootprint = previous.showFootprint;
        if (camera) camera.position.copy(previous.cameraPosition);
        if (controls) {
            controls.target.copy(previous.controlsTarget);
            controls.minDistance = previous.controlsMinDistance;
            controls.maxDistance = previous.controlsMaxDistance;
            controls.update();
        }
        if (detailedSatelliteModel) {
            detailedSatelliteModel.visible = !!previous.detailedSatelliteModelVisible;
        }
        solarSystemPreviousState = null;
    }

    function setSolarSystemOverviewMode(enabled, { restorePrevious = true, resetOverviewCamera = true } = {}) {
        const next = !!enabled;
        if (next === !!simParams.solarSystemOverview) {
            syncSolarSystemControlsState();
            return;
        }
        if (next) {
            solarSystemPreviousState = snapshotSolarSystemPreviousState();
            simParams.solarSystemOverview = true;
            simParams.solarSystemFocusedPlanet = null;
            simParams.view3D = true;
            simParams.viewMercator = false;
            setSolarSystemOverviewVisible(solarSystemOverview, true);
            if (resetOverviewCamera) resetSolarSystemOverviewCamera(solarSystemOverview, camera, controls);
        } else {
            simParams.solarSystemOverview = false;
            simParams.solarSystemFocusedPlanet = null;
            setSolarSystemOverviewVisible(solarSystemOverview, false);
            setSolarSystemSelectedPlanet(solarSystemOverview, null);
            if (restorePrevious) restoreSolarSystemPreviousState();
            if (!restorePrevious) solarSystemPreviousState = null;
            restoreEarthControlLimits();
            updateSatelliteList();
            if (renderer?.domElement) renderer.domElement.style.cursor = '';
        }
        setSolarSystemEarthLayerVisibility(simParams.solarSystemOverview);
        syncSolarSystemControlsState();
        updateViewShortcutButtonsState();
        if (view3DToggle) view3DToggle.checked = simParams.view3D;
        if (viewMercatorToggle) viewMercatorToggle.checked = simParams.viewMercator;
        if (showOrbitToggle) showOrbitToggle.checked = simParams.showOrbit;
        if (showOrbitFrameToggleElement) showOrbitFrameToggleElement.checked = simParams.showOrbitFrame;
        const showFootprintChk = document.getElementById('showFootprintCheckbox');
        if (showFootprintChk) showFootprintChk.checked = simParams.showFootprint;
        const showDayNightToggle = document.getElementById('showDayNightToggle');
        if (showDayNightToggle) showDayNightToggle.checked = simParams.showDayNight;
        updateSolarSystemOptions();
    }

    function focusSolarSystemPlanetInMode(planetName) {
        if (!planetName) return;
        if (planetName === 'Earth') {
            activateEarthFromSolarSystemSelection();
            return;
        }
        if (planetName === 'Moon') {
            activateMoonFromSolarSystemSelection();
            return;
        }
        if (planetName === 'Mars') {
            activateMarsFromSolarSystemSelection();
            return;
        }
        simParams.solarSystemFocusedPlanet = planetName;
        focusSolarSystemPlanet(solarSystemOverview, planetName, camera, controls);
        updateSolarSystemSelectionUi();
    }

        simParams.solarSystemFocusedPlanet = null;
        resetSolarSystemOverviewCamera(solarSystemOverview, camera, controls);
        updateSolarSystemSelectionUi();

        if (!simParams.solarSystemOverview || !renderer?.domElement) return;

        renderer.domElement.style.cursor = planetName ? 'pointer' : 'grab';

        if (!simParams.solarSystemOverview) return;
        const planetName = pickSolarSystemPlanet(solarSystemOverview, event, camera);
        if (planetName) focusSolarSystemPlanetInMode(planetName);

        if (!simParams.solarSystemOverview || event.key !== 'Escape') return;
        if (simParams.solarSystemFocusedPlanet) {
            returnToSolarSystemOverview();
        } else {
            setSolarSystemOverviewMode(false, { restorePrevious: true });
        }
    }

    function init3D() {
        /* Scene, Camera, Renderer */
        scene = new THREE.Scene();

        camera = new THREE.PerspectiveCamera(
            sceneConfig.camera.fov,
            window.innerWidth / window.innerHeight,
            sceneConfig.camera.near,
            sceneConfig.camera.far
        );
        camera.position.set(...sceneConfig.camera.position);
        defaultCameraNear = camera.near;
        defaultCameraFar = camera.far;
        defaultCameraUp = camera.up.clone();

        renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = SCENE_TONE_MAPPING_EXPOSURE;
        // Keep global shadows on; Sun light in drawDayNight3D has shadows disabled by default
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // expose
        window.renderer = renderer;
        window.camera = camera;

        /* Lighting */
        scene.add(new THREE.AmbientLight(0xffffff, 0.15));

        const dirLight = new THREE.DirectionalLight(
            sceneConfig.directionalLight.color,
            Math.min(sceneConfig.directionalLight.intensity, 0.08)
        );
        dirLight.name = 'legacyLowSceneFillLight';
        dirLight.position.set(...sceneConfig.directionalLight.position);
        // Keep shadows off on helper light to save perf
        dirLight.castShadow = false;
        scene.add(dirLight);

        selectedModelFillLight = new THREE.PointLight(
            0xffffff,
            SELECTED_MODEL_FILL_LIGHT_INTENSITY,
            0,
            SELECTED_MODEL_FILL_LIGHT_DECAY
        );
        selectedModelFillLight.visible = false;
        scene.add(selectedModelFillLight);

        selectedModelEarthAlbedoTarget = new THREE.Object3D();
        selectedModelEarthAlbedoTarget.name = 'selectedModelEarthAlbedoTarget';
        scene.add(selectedModelEarthAlbedoTarget);

        selectedModelEarthAlbedoLight = new THREE.DirectionalLight(0x9fd8ff, 0);
        selectedModelEarthAlbedoLight.name = 'selectedModelEarthAlbedoLight';
        selectedModelEarthAlbedoLight.castShadow = false;
        selectedModelEarthAlbedoLight.visible = false;
        selectedModelEarthAlbedoLight.target = selectedModelEarthAlbedoTarget;
        scene.add(selectedModelEarthAlbedoLight);

        /* Earth */
        textureLoader = new THREE.TextureLoader();
        const earthMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
        earthMat.depthTest = true;
        earthMat.depthWrite = true;
        earthMat.transparent = false;
        earthMesh = new THREE.Mesh(
            new THREE.SphereGeometry(EARTH_SCENE_RADIUS, 64, 64),
            earthMat
        );
        earthMesh.receiveShadow = true;
        earthMesh.renderOrder = 0;
        scene.add(earthMesh);
        updateEarthTexture();

        /* ECEF Axes */
        addECEFAxes(scene);
        updateECEFAxesVisibility(simParams);

        /* LVLH */
        orbitFrame = createOrbitFrame(scene);
        setOrbitFrameVisibility(orbitFrame, false);

        /* Moon (always visible) */
        moon = createMoon(scene, EARTH_SCENE_RADIUS, {
            textureUrl: 'textures/moon_map2.jpg'
        });
        updateMoon(moon, SIM_DATE);

        /* Mars (always available for Earth/Moon/Mars context switching) */
        mars = createMars(scene, EARTH_SCENE_RADIUS, {
            textureUrl: MARS_TEXTURE_URL,
            onTextureLoadStart: () => recordMarsTextureLoadState('loading', 0),
            onTextureLoadProgress: handleMarsTextureProgress,
            onTextureLoadComplete: () => recordMarsTextureLoadState('complete', 100),
            onTextureLoadError: () => recordMarsTextureLoadState('error', 100)
        });
        updateMars(mars, SIM_DATE);

        /* Stars & Milky Way (created hidden; toggled from Views & Time) */
        initStarsMilkyWayLayer();

        /* Controls */
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = controlsConfig.enableDamping;
        controls.dampingFactor = controlsConfig.dampingFactor;
        controls.enablePan = false;
        controls.minDistance = EARTH_MODE_MIN_DISTANCE;
        controls.maxDistance = SAFE_MAX_CONTROL_DISTANCE;
        defaultControlsMinDistance = controls.minDistance;
        defaultControlsMaxDistance = controls.maxDistance;
        controls.enableZoom = true;
        camera.far = SAFE_CAMERA_FAR;
        defaultCameraFar = camera.far;
        camera.updateProjectionMatrix();

        /* Solar System Overview (created hidden; toggled from Views & Time) */
        solarSystemOverview = createSolarSystemOverview(scene, { renderer, camera, controls });
        setSolarSystemOverviewVisible(solarSystemOverview, false);
        renderer.domElement.addEventListener('pointermove', handleSolarSystemPointerMove);
        renderer.domElement.addEventListener('click', handleSolarSystemPointerClick);
        window.addEventListener('keydown', handleSolarSystemKeydown);
    }

            });
