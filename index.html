    async function handleSatelliteDropdownChange(event) {
        const selectionToken = ++satelliteModelLoadToken;
        const selectedNameInDropdown = event.target.value;
        const selectedOption = event.target.selectedOptions?.[0];
        const selectedNoradId = selectedOption?.dataset?.noradId;
        simParams.selectedSatelliteName = selectedNameInDropdown;

        if (detailedSatelliteModel?.userData?.noradId) {
            const prevTleSat = satellites.find(s => s.norad_id.toString() === detailedSatelliteModel.userData.noradId.toString());
            if (prevTleSat?.mesh) {
                prevTleSat.mesh.visible = true;
                prevTleSat.isSelected = false;
                prevTleSat.mesh.material.color.set(0xffffff);
                prevTleSat.mesh.scale.set(...(satelliteConfig.scale || [0.1, 0.1, 0.1]));
            }
        }

        clearDetailedSatelliteView();
        removeAllGeometry(scene);

        if (selectedNameInDropdown === "None") {
            currentSelectedSatellite = null;
            simParams.selectedSatelliteNoradId = null;
            setShowOnlySelectedSatellite(false);
            updateSelectedSatelliteSummary(null);
            syncSatelliteSearchWithSelection();
            resetCameraToDefault();
            updateSatelliteList();
            ensureYPRControlsVisibleForSelection();
            return;
        }

        let tleSatData = selectedNoradId
            ? satellites.find(s => s.norad_id.toString() === selectedNoradId)
            : null;

        if (!tleSatData) {
            tleSatData = satellites.find(s => s.satellite_name === selectedNameInDropdown);
        }
        if (!tleSatData) {
            currentSelectedSatellite = null;
            simParams.selectedSatelliteNoradId = null;
            setShowOnlySelectedSatellite(false);
            if (satelliteSelectDropdown) satelliteSelectDropdown.value = "None";
            simParams.selectedSatelliteName = "None";
            updateSelectedSatelliteSummary(null);
            syncSatelliteSearchWithSelection();
            updateSatelliteList();
            ensureYPRControlsVisibleForSelection();
            return;
        }

        currentSelectedSatellite = tleSatData;
        simParams.selectedSatelliteNoradId = tleSatData.norad_id?.toString() || null;
        setShowOnlySelectedSatellite(true);
        enableHighDefForSelectedSatelliteIfNeeded(tleSatData);
        updateSelectedSatelliteSummary(tleSatData);
        markSatelliteSearchReadyForNextSelection(tleSatData);
        ensureYPRControlsVisibleForSelection();

        satellites.forEach(s => { if (s.mesh) s.mesh.visible = (s === tleSatData); });

        if (simParams.showOrbit) {
            updateOrbitTrajectory(scene, simParams, tleSatData);
        }

        selectSatelliteSprite(tleSatData);

        const modelResolution = resolveSatelliteModel(tleSatData);
        if (!modelResolution.found) {
            console.warn(
                `[model] ${tleSatData.satellite_name}: ${modelResolution.reason}. Using selected sprite fallback.`
            );
            if (tleSatData.mesh) flyCameraToSelectedSatellite(tleSatData.mesh, 1000, true);
            updateSatelliteList();
        } else {
            console.info(
                `[model] ${tleSatData.satellite_name}: resolved local model "${modelResolution.assetId}" (${modelResolution.reason}).`,
                { attemptedPaths: modelResolution.attemptedPaths }
            );

            const verifiedModel = await verifyResolvedModelAsset(modelResolution, checkFileExists);
            if (selectionToken !== satelliteModelLoadToken || currentSelectedSatellite !== tleSatData) {
                console.info(`[model] ${tleSatData.satellite_name}: ignored stale model lookup result.`);
                return;
            }

            if (verifiedModel.exists) {
                await loadAndDisplayDetailedSatellite(tleSatData.norad_id, tleSatData, verifiedModel, selectionToken);
                if (selectionToken !== satelliteModelLoadToken || currentSelectedSatellite !== tleSatData) return;
                if (simParams.showOnlySelectedSatellite) updateSatelliteList();
            } else {
                const checkedPaths = (verifiedModel.checkedPaths || [])
                    .map(check => `${check.path}:${check.ok ? 'ok' : 'missing'}`)
                    .join(', ');
                console.warn(
                    `[model] ${tleSatData.satellite_name}: local model files not found for "${verifiedModel.assetId}". `
                    + `Checked ${checkedPaths || 'no paths'}. Using selected sprite fallback.`
                );
                if (tleSatData.mesh) flyCameraToSelectedSatellite(tleSatData.mesh, 1000, true);
                updateSatelliteList();
            }
        }

        ensureYPRControlsVisibleForSelection();
    }

    async function loadAndDisplayDetailedSatellite(noradId, tleSatData, modelResolution, selectionToken) {
        const resolvedModel = typeof modelResolution === 'string'
            ? {
                assetId: modelResolution,
                metadataId: modelResolution.replace(/\.[^.]+$/, ''),
                kind: /\.glb$/i.test(modelResolution) ? 'glb' : 'obj-mtl',
                attemptedPaths: []
            }
            : modelResolution;
        const isCurrentSelection = () =>
            selectionToken === satelliteModelLoadToken && currentSelectedSatellite === tleSatData;

        console.info(
            `[model] ${tleSatData?.satellite_name || noradId}: loading "${resolvedModel.assetId}".`,
            { attemptedPaths: resolvedModel.attemptedPaths }
        );
        const newModel = await showSatellite(noradId, scene, resolvedModel.assetId, {
            assetId: resolvedModel.assetId,
            metadataId: resolvedModel.metadataId,
            kind: resolvedModel.kind,
            attemptedPaths: resolvedModel.attemptedPaths,
            shouldAttach: isCurrentSelection,
            usePlaceholderOnFailure: false
        });

        if (!isCurrentSelection()) return;

        const modelVisibility = newModel?.userData?.modelVisibility;
        const hasVisibleModel = !!newModel && modelVisibility?.visible !== false;

        if (hasVisibleModel) {
            detailedSatelliteModel = newModel;
            detailedSatelliteModel.userData.noradId = noradId;
            detailedSatelliteModel.userData.modelResolution = resolvedModel;
            console.info(
                `[model] ${tleSatData.satellite_name}: confirmed visible detailed model.`,
                modelVisibility
            );
            normalizeSelectedModelVisualFit(detailedSatelliteModel);

            if (tleSatData?.satrec) {
                currentSelectedSatellite = tleSatData;
                simParams.selectedSatelliteNoradId = tleSatData.norad_id?.toString() || null;
                tleSatData.isSelected = true;
                if (tleSatData.mesh) {
                    tleSatData.mesh.visible = false;
                }

                // Initial model position
                const now = SIM_DATE; // reuse
                const pv = satellite.propagate(tleSatData.satrec, now);
                if (setDetailedSatelliteModelPositionFromPropagation(pv, 'initial-detailed-model-load')) {
                    applySelectedSatelliteNadirOrientation(pv);
                }
            } else {
                currentSelectedSatellite = tleSatData;
                simParams.selectedSatelliteNoradId = tleSatData?.norad_id?.toString() || null;
            }

            satellites.forEach(s => {
                if (s !== tleSatData && s.mesh) {
                    s.isSelected = false;
                    s.mesh.material.color.set(0xffffff);
                    s.mesh.scale.set(...(satelliteConfig.scale || [0.1, 0.1, 0.1]));
                }
            });

            flyCameraToSelectedSatellite(detailedSatelliteModel, 1500, false);
            if (simParams.showOrbit && currentSelectedSatellite) {
                updateOrbitTrajectory(scene, simParams, currentSelectedSatellite);
            }
            console.info(`[model] ${tleSatData.satellite_name}: detailed model "${resolvedModel.assetId}" displayed.`);
        } else {
            if (tleSatData) {
                console.warn(
                    `[model] ${tleSatData.satellite_name}: failed to load "${resolvedModel.assetId}". Using selected sprite fallback.`
                );
                selectSatelliteSprite(tleSatData);
                if (tleSatData.mesh) flyCameraToSelectedSatellite(tleSatData.mesh, 1000, true);
            } else {
                if (satelliteSelectDropdown) satelliteSelectDropdown.value = "None";
                simParams.selectedSatelliteName = "None";
                currentSelectedSatellite = null;
                simParams.selectedSatelliteNoradId = null;
                resetCameraToDefault();
            }
            const errorDiv = document.createElement('div');
            errorDiv.style.cssText = "position:fixed; top:10px; left:10px; padding:10px; background:orange; color:black; z-index:1000;";
            errorDiv.innerText = `Failed to load 3D model for satellite NORAD ID: ${noradId}. Displaying TLE marker.`;
            document.body.appendChild(errorDiv);
            setTimeout(() => errorDiv.remove(), 5000);
        }
    }

    function clearDetailedSatelliteView() {
        disableSelectedModelTracking();
        if (detailedSatelliteModel) {
            const oldNoradId = detailedSatelliteModel.userData ? detailedSatelliteModel.userData.noradId : null;
            clearCurrentDetailedSat(scene);
            scene.remove(detailedSatelliteModel);
            detailedSatelliteModel = null;
            if (selectedModelFillLight) selectedModelFillLight.visible = false;
            if (selectedModelEarthAlbedoLight) selectedModelEarthAlbedoLight.visible = false;

            if (oldNoradId) {
                const tleSat = satellites.find(s => s.norad_id.toString() === oldNoradId.toString());
                if (tleSat?.mesh) {
                    tleSat.mesh.visible = true;
                }
            }
        }
    }

    const clock = new THREE.Clock();
    let cameraMove = null;

    function enforceSceneOrigin() {
        if (earthMesh) earthMesh.position.set(0, 0, 0);
    }

    function enforceActiveControlTarget() {
        if (!controls || cameraMove || selectedModelTracking) return;
        enforceSceneOrigin();
        if (currentSelectedSatellite || detailedSatelliteModel?.visible) return;
        if (simParams.otherSelection === 'Moon' && moon) {
            controls.target.copy(moon.position);
        } else if (simParams.otherSelection === 'Mars' && mars) {
            controls.target.copy(mars.position);
        } else {
            controls.target.set(0, 0, 0);
        }
    }

    function restoreEarthControlLimits() {
        disableSelectedModelTracking();
        if (!controls) return;
        if (defaultControlsMinDistance !== null) controls.minDistance = defaultControlsMinDistance;
        if (defaultControlsMaxDistance !== null) controls.maxDistance = defaultControlsMaxDistance;
        controls.enablePan = false;
        if (camera) {
            if (defaultCameraNear !== null) camera.near = defaultCameraNear;
            camera.far = SAFE_CAMERA_FAR;
            defaultCameraFar = camera.far;
            if (defaultCameraUp) camera.up.copy(defaultCameraUp);
            camera.updateProjectionMatrix();
        }
        if (selectedModelFillLight) selectedModelFillLight.visible = false;
        if (selectedModelEarthAlbedoLight) selectedModelEarthAlbedoLight.visible = false;
    }

    function getObjectVisualDiameter(targetObject, fallbackDiameter = 0) {
        if (!targetObject) return fallbackDiameter;
        const bbox = new THREE.Box3().setFromObject(targetObject);
        if (typeof bbox.isEmpty === 'function' && bbox.isEmpty()) return fallbackDiameter;
        const size = V_TMP1;
        bbox.getSize(size);
        const diameter = Math.max(size.x || 0, size.y || 0, size.z || 0);
        return Number.isFinite(diameter) && diameter > 0
            ? Math.max(diameter, fallbackDiameter)
            : fallbackDiameter;
    }

    function isStarlinkSatelliteData(satData = currentSelectedSatellite) {
        const text = [
            satData?.satellite_name,
            satData?.name,
            satData?.company,
            satData?.operator,
            satData?.meta?.operator,
            satData?.meta?.manufacturer
        ].filter(Boolean).join(' ').toLowerCase();
        return text.includes('starlink') || text.includes('spacex');
    }

    function isStarlinkDetailedModel(targetObject) {
        if (!targetObject || targetObject !== detailedSatelliteModel) return false;
        const modelResolution = targetObject.userData?.modelResolution;
        const assetId = String(modelResolution?.assetId || targetObject.userData?.updatedNoradId || '').toLowerCase();
        const metadataId = String(modelResolution?.metadataId || targetObject.userData?.metadataId || '').toLowerCase();
        return assetId === STARLINK_MODEL_ASSET_ID.toLowerCase() ||
            metadataId === STARLINK_MODEL_ASSET_ID.toLowerCase() ||
            isStarlinkSatelliteData(currentSelectedSatellite);
    }

    function isIssSatelliteData(satData = currentSelectedSatellite) {
        const norad = satData?.norad_id?.toString();
        const name = String(satData?.satellite_name || satData?.name || '').toUpperCase();
        return norad === ISS_NORAD_ID || /\bISS\b|\bZARYA\b/.test(name);
    }

    function isIssDetailedModel(targetObject) {
        if (!targetObject || targetObject !== detailedSatelliteModel) return false;
        const modelResolution = targetObject.userData?.modelResolution;
        const assetId = String(modelResolution?.assetId || targetObject.userData?.updatedNoradId || '').toLowerCase();
        const metadataId = String(modelResolution?.metadataId || targetObject.userData?.metadataId || '').toLowerCase();
        return assetId === ISS_MODEL_ASSET_ID.toLowerCase() ||
            metadataId === 'iss' ||
            isIssSatelliteData(currentSelectedSatellite);
    }

    function selectedSatelliteVelocitySceneFromPropagation(propagation) {
        if (!propagation?.velocity) return null;
        return eciToSceneVector(V_TMP3, propagation.velocity);
    }

    function currentSelectedOrbitalFrame(targetPos, propagation = null) {
        if (!currentSelectedSatellite?.satrec || !targetPos) return null;
        let pv = propagation;
        if (!pv?.velocity) {
            pv = satellite.propagate(currentSelectedSatellite.satrec, SIM_DATE);
        }
        const velocityScene = selectedSatelliteVelocitySceneFromPropagation(pv);
        if (!velocityScene) return null;
        return selectedSatelliteOrbitalFrame(targetPos, velocityScene);
    }

    function currentStarlinkOrbitalFrame(targetPos, propagation = null) {
        return currentSelectedOrbitalFrame(targetPos, propagation);
    }

    function selectedStarlinkCameraFrameOptions(targetPos, propagation = null) {
        const orbitalFrame = currentStarlinkOrbitalFrame(targetPos, propagation);
        if (!orbitalFrame) {
            console.warn('[camera] Starlink orbital-frame velocity unavailable; falling back to nadir observer view.');
            return null;
        }
        const observerDirection = selectedSatelliteObliqueObserverDirection(orbitalFrame);
        const cameraUp = selectedSatelliteObliqueCameraUp(orbitalFrame, observerDirection);
        if (!observerDirection || !cameraUp) {
            console.warn('[camera] Starlink oblique observer frame unavailable; falling back to nadir observer view.');
            return null;
        }
        return {
            orbitalFrame,
            observerDirection,
            cameraUp
        };
    }

    function vectorSnapshot(value) {
        if (!value) return null;
        return {
            x: Number(value.x),
            y: Number(value.y),
            z: Number(value.z)
        };
    }

    function updateSelectedOrbitAlignmentDiagnostic(propagation, propagatedScenePosition, source = 'unknown') {
        if (!detailedSatelliteModel || !propagatedScenePosition) return null;
        detailedSatelliteModel.updateMatrixWorld(true);
        const modelWorldPosition = detailedSatelliteModel.getWorldPosition(new THREE.Vector3());
        const spriteWorldPosition = currentSelectedSatellite?.mesh
            ? currentSelectedSatellite.mesh.getWorldPosition(new THREE.Vector3())
            : null;
        const nearestOrbitPoint = selectedOrbitNearestPointDistance(modelWorldPosition);
        const rootToPropagatedDistanceSceneUnits = modelWorldPosition.distanceTo(propagatedScenePosition);
        const diagnostic = {
            source,
            propagatedEciTemeKm: vectorSnapshot(propagation?.position),
            propagatedScenePosition: vectorSnapshot(propagatedScenePosition),
            detailedModelWorldPosition: vectorSnapshot(modelWorldPosition),
            selectedSpriteWorldPosition: vectorSnapshot(spriteWorldPosition),
            rootToPropagatedDistanceSceneUnits,
            nearestOrbitLinePointDistanceSceneUnits: nearestOrbitPoint?.distanceSceneUnits ?? null,
            nearestOrbitLinePoint: vectorSnapshot(nearestOrbitPoint?.nearestPoint),
            sceneScale: KM_TO_SCENE_UNITS,
            toleranceSceneUnits: SELECTED_ORBIT_ALIGNMENT_TOLERANCE_SCENE_UNITS,
            alignedToPropagatedPosition: rootToPropagatedDistanceSceneUnits <= SELECTED_ORBIT_ALIGNMENT_TOLERANCE_SCENE_UNITS
        };
        detailedSatelliteModel.userData.orbitAlignment = diagnostic;

        if (!diagnostic.alignedToPropagatedPosition) {
            console.warn('[orbit-alignment] Selected detailed model root is detached from propagated satellite position.', diagnostic);
        } else if (orbitAlignmentDebugEnabled) {
            console.info('[orbit-alignment] Selected detailed model root alignment diagnostic.', diagnostic);
        }
        return diagnostic;
    }

    function setDetailedSatelliteModelPositionFromPropagation(propagation, source = 'unknown') {
        if (!detailedSatelliteModel || !isUsableOrbitPosition(propagation?.position)) return false;
        const propagatedScenePosition = eciToSceneVector(V_TMP4, propagation.position).clone();
        detailedSatelliteModel.position.copy(propagatedScenePosition);
        detailedSatelliteModel.updateMatrixWorld(true);
        if (currentSelectedSatellite?.mesh) {
            currentSelectedSatellite.mesh.position.copy(propagatedScenePosition);
            currentSelectedSatellite.mesh.userData.selectedDetailedModelCanonicalPosition = true;
        }
        updateSelectedOrbitAlignmentDiagnostic(propagation, propagatedScenePosition, source);
        return true;
    }

    function computeSelectedModelObserverFrame(targetObject, propagation = null) {
        if (!targetObject || !camera) return null;
        targetObject.updateMatrixWorld(true);

        const targetPos = new THREE.Vector3().setFromMatrixPosition(targetObject.matrixWorld);
        const selectedNear = Math.max(SELECTED_MODEL_CAMERA_NEAR_SCENE_UNITS, 1e-7);
        const storedDiameter = targetObject.userData?.selectedView?.modelDiameterSceneUnits ||
            targetObject.userData?.selectedModelVisualFit?.afterDiameterSceneUnits || 0;
        const modelDiameter = Number.isFinite(storedDiameter) && storedDiameter > 0
            ? storedDiameter
            : getObjectVisualDiameter(targetObject, 0);
        const starlinkCameraFrame = isStarlinkDetailedModel(targetObject)
            ? selectedStarlinkCameraFrameOptions(targetPos, propagation)
            : null;
        const frame = selectedSatelliteCameraFrame(targetPos, {
            requestedMeters: SELECTED_SATELLITE_TARGET_METERS,
            modelDiameterSceneUnits: modelDiameter,
            cameraNearSceneUnits: selectedNear,
            earthRadiusSceneUnits: EARTH_SCENE_RADIUS,
            earthContextDistanceSceneUnits: 0,
            preservePhysicalDistance: true,
            observerDirectionScene: starlinkCameraFrame?.observerDirection || null
        });
        if (!frame) return null;

        return {
            frame,
            targetPos,
            selectedNear,
            modelDiameter,
            cameraPosition: new THREE.Vector3(frame.position.x, frame.position.y, frame.position.z),
            cameraTarget: new THREE.Vector3(frame.target.x, frame.target.y, frame.target.z),
            cameraUp: starlinkCameraFrame?.cameraUp || null,
            observerPlacement: starlinkCameraFrame
                ? 'starlink-oblique-orbital-frame'
                : 'selected-model-radial'
        };
    }

    function selectedTrackingBasis(trackingFrame) {
        if (!trackingFrame?.frame?.observerDirection) return null;
        const viewAxis = new THREE.Vector3(
            trackingFrame.frame.observerDirection.x,
            trackingFrame.frame.observerDirection.y,
            trackingFrame.frame.observerDirection.z
        );
        if (viewAxis.lengthSq() < 1e-12) return null;
        viewAxis.normalize();

        let upAxis = trackingFrame.cameraUp?.clone?.() || camera?.up?.clone?.() || defaultCameraUp?.clone?.();
        if (!upAxis || upAxis.lengthSq() < 1e-12) upAxis = new THREE.Vector3(0, 1, 0);
        upAxis.addScaledVector(viewAxis, -upAxis.dot(viewAxis));
        if (upAxis.lengthSq() < 1e-12) {
            upAxis = Math.abs(viewAxis.y) < 0.95
                ? new THREE.Vector3(0, 1, 0)
                : new THREE.Vector3(1, 0, 0);
            upAxis.addScaledVector(viewAxis, -upAxis.dot(viewAxis));
        }
        if (upAxis.lengthSq() < 1e-12) return null;
        upAxis.normalize();

        const rightAxis = new THREE.Vector3().crossVectors(upAxis, viewAxis);
        if (rightAxis.lengthSq() < 1e-12) return null;
        rightAxis.normalize();

        return { rightAxis, upAxis, viewAxis };
    }

    function cameraOffsetToSelectedFrameLocal(cameraPosition, targetPosition, basis) {
        if (!cameraPosition || !targetPosition || !basis) return null;
        const offset = cameraPosition.clone().sub(targetPosition);
        return new THREE.Vector3(
            offset.dot(basis.rightAxis),
            offset.dot(basis.upAxis),
            offset.dot(basis.viewAxis)
        );
    }

    function selectedFrameLocalToCameraOffset(localOffset, basis) {
        if (!localOffset || !basis) return null;
        return new THREE.Vector3()
            .addScaledVector(basis.rightAxis, localOffset.x)
            .addScaledVector(basis.upAxis, localOffset.y)
            .addScaledVector(basis.viewAxis, localOffset.z);
    }

    function updateSelectedModelLighting(jDay) {
        const hasDetailedModel = !!(detailedSatelliteModel?.visible && currentSelectedSatellite?.satrec);

        if (selectedModelFillLight) {
            selectedModelFillLight.visible = hasDetailedModel && SELECTED_MODEL_FILL_LIGHT_INTENSITY > 0;
            selectedModelFillLight.intensity = SELECTED_MODEL_FILL_LIGHT_INTENSITY;
            if (selectedModelFillLight.visible) {
                selectedModelFillLight.position.copy(camera.position);
            }
        }

        if (!selectedModelEarthAlbedoLight || !selectedModelEarthAlbedoTarget) return;
        if (!hasDetailedModel) {
            selectedModelEarthAlbedoLight.visible = false;
            return;
        }

        const satPos = V_TMP1.copy(detailedSatelliteModel.position);
        if (satPos.lengthSq() < 1e-12) {
            selectedModelEarthAlbedoLight.visible = false;
            return;
        }

        const earthToSatellite = V_TMP2.copy(satPos).normalize();
        const sunDirection = V_TMP3.copy(sunSceneVectorFromJD(jDay, 1)).normalize();
        const sunlitEarthFactor = Math.max(
            SELECTED_MODEL_EARTH_ALBEDO_MIN_FACTOR,
            Math.max(0, earthToSatellite.dot(sunDirection))
        );
        const distanceFactor = Math.min(
            1,
            Math.pow(EARTH_SCENE_RADIUS / Math.max(EARTH_SCENE_RADIUS, satPos.length()), 1.2)
        );
        const albedoIntensity = SELECTED_MODEL_EARTH_ALBEDO_INTENSITY * sunlitEarthFactor * distanceFactor;

        selectedModelEarthAlbedoLight.visible = albedoIntensity > 0.001;
        selectedModelEarthAlbedoLight.intensity = albedoIntensity;
        selectedModelEarthAlbedoLight.position.copy(
            V_TMP4.copy(earthToSatellite).multiplyScalar(EARTH_SCENE_RADIUS * 0.98)
        );
        selectedModelEarthAlbedoTarget.position.copy(satPos);
        selectedModelEarthAlbedoLight.target.updateMatrixWorld();
    }

    function normalizeSelectedModelVisualFit(targetObject) {
        if (!targetObject || !camera) return 0;
        targetObject.updateMatrixWorld(true);
        const beforeDiameter = getObjectVisualDiameter(targetObject, 0);
        const visualFit = resolveSelectedModelVisualScale({
            modelDiameterSceneUnits: beforeDiameter,
            observerDistanceSceneUnits: SELECTED_MODEL_OBSERVER_DISTANCE_SCENE_UNITS,
            cameraFovDeg: camera.fov
        });

        if (
            Number.isFinite(visualFit.scaleMultiplier) &&
            visualFit.scaleMultiplier > 0 &&
            Math.abs(visualFit.scaleMultiplier - 1) > 1e-6
        ) {
            targetObject.scale.multiplyScalar(visualFit.scaleMultiplier);
            targetObject.updateMatrixWorld(true);
        }

        const afterDiameter = getObjectVisualDiameter(targetObject, beforeDiameter);
        const finalViewportHeightFraction = selectedModelViewportHeightFraction({
            modelDiameterSceneUnits: afterDiameter,
            observerDistanceSceneUnits: SELECTED_MODEL_OBSERVER_DISTANCE_SCENE_UNITS,
            cameraFovDeg: camera.fov
        });
        targetObject.userData.selectedModelVisualFit = {
            ...visualFit,
            beforeDiameterSceneUnits: beforeDiameter,
            afterDiameterSceneUnits: afterDiameter,
            finalViewportHeightFraction,
            observerDistanceSceneUnits: SELECTED_MODEL_OBSERVER_DISTANCE_SCENE_UNITS,
            observerDistanceMeters: SELECTED_SATELLITE_TARGET_METERS
        };
        targetObject.userData.modelVisibility = diagnoseModelVisibility(targetObject);
        console.info(
            `[model] Selected model visual fit at ${SELECTED_SATELLITE_TARGET_METERS} m.`,
            targetObject.userData.selectedModelVisualFit
        );
        return afterDiameter;
    }

    function enableSelectedModelTracking(targetObject) {
        if (!targetObject) return;
        targetObject.updateMatrixWorld(true);
        selectedModelTracking = {
            targetObject,
            lastTargetPosition: new THREE.Vector3().setFromMatrixPosition(targetObject.matrixWorld),
            lastFrameBasis: null,
            localCameraOffset: null
        };
    }

    function disableSelectedModelTracking() {
        selectedModelTracking = null;
    }

    function updateSelectedModelTracking(propagation = null) {
        if (!selectedModelTracking?.targetObject || !camera || !controls || !simParams.view3D) return;
        const targetObject = selectedModelTracking.targetObject;
        if (targetObject !== detailedSatelliteModel || !targetObject.visible) {
            disableSelectedModelTracking();
            return;
        }

        const trackingFrame = computeSelectedModelObserverFrame(targetObject, propagation);
        if (!trackingFrame) {
            targetObject.updateMatrixWorld(true);
            const targetPos = V_TMP1.setFromMatrixPosition(targetObject.matrixWorld);
            const delta = V_TMP2.copy(targetPos).sub(selectedModelTracking.lastTargetPosition);

            if (delta.lengthSq() > 0) {
                if (cameraMove) {
                    cameraMove.endCamPos.add(delta);
                    cameraMove.endTarget.add(delta);
                } else {
                    camera.position.add(delta);
                }
            }

            controls.target.copy(targetPos);
            selectedModelTracking.lastTargetPosition.copy(targetPos);
            controls.update();
            return;
        }

        if (trackingFrame.cameraUp) {
            camera.up.copy(trackingFrame.cameraUp);
        } else if (defaultCameraUp) {
            camera.up.copy(defaultCameraUp);
        }

        const basis = selectedTrackingBasis(trackingFrame);
        if (!basis) return;

        if (cameraMove) {
            cameraMove.endCamPos.copy(trackingFrame.cameraPosition);
            cameraMove.endTarget.copy(trackingFrame.cameraTarget);
            selectedModelTracking.localCameraOffset = cameraOffsetToSelectedFrameLocal(
                trackingFrame.cameraPosition,
                trackingFrame.cameraTarget,
                basis
            );
            selectedModelTracking.lastFrameBasis = basis;
        } else {
            if (selectedModelTracking.lastFrameBasis) {
                selectedModelTracking.localCameraOffset = cameraOffsetToSelectedFrameLocal(
                    camera.position,
                    controls.target,
                    selectedModelTracking.lastFrameBasis
                ) || selectedModelTracking.localCameraOffset;
            }
            if (!selectedModelTracking.localCameraOffset) {
                selectedModelTracking.localCameraOffset = cameraOffsetToSelectedFrameLocal(
                    trackingFrame.cameraPosition,
                    trackingFrame.cameraTarget,
                    basis
                );
            }
            const cameraOffset = selectedFrameLocalToCameraOffset(selectedModelTracking.localCameraOffset, basis);
            if (cameraOffset) {
                camera.position.copy(trackingFrame.cameraTarget).add(cameraOffset);
            }
            controls.target.copy(trackingFrame.cameraTarget);
            selectedModelTracking.lastFrameBasis = basis;
        }

        selectedModelTracking.lastTargetPosition.copy(trackingFrame.targetPos);
        controls.update();
    }

    function animateCameraTo(endCamPos, endTarget, millis = 1500) {
        if (!camera || !controls || !endCamPos || !endTarget) return;
        const startCamPos = camera.position.clone();
        const startTarget = controls.target.clone();

        cameraMove = {
            startTime: clock.getElapsedTime(),
            duration: millis / 1000,
            startCamPos,
            endCamPos: endCamPos.clone(),
            startTarget,
            endTarget
        };

        controls.enabled = false;
    }

    function flyCameraToObject(targetObject, millis = 1500, options = {}) {
        if (!targetObject || !camera || !controls) return;
        targetObject.updateMatrixWorld(true);
        const targetPos = V_TMP2.setFromMatrixPosition(targetObject.matrixWorld);
        const outward = V_TMP3.copy(targetPos).normalize();
        const diameter = getObjectVisualDiameter(targetObject, EARTH_SCENE_RADIUS * 0.25);
        const distanceMultiplier = options.distanceMultiplier ?? 4;
        const minContextDistance = options.minContextDistance ?? EARTH_SCENE_RADIUS * 0.6;
        const distance = Math.max(diameter * distanceMultiplier, minContextDistance);
        const endCamPos = outward.multiplyScalar(distance).add(targetPos).clone();
        animateCameraTo(endCamPos, targetPos.clone(), millis);
    }

    function flyCameraToSelectedSatellite(targetObject, millis = 1500, isSprite = false) {
        if (!targetObject || !camera || !controls) return;
        if (!simParams.view3D) return;
        targetObject.updateMatrixWorld(true);

        const targetPos = V_TMP2.setFromMatrixPosition(targetObject.matrixWorld);
        const spriteDiameter = Math.max(...(satelliteConfig.scale || [0.25, 0.25, 1]));
        let modelDiameter = isSprite
            ? spriteDiameter
            : getObjectVisualDiameter(targetObject, spriteDiameter);
        let selectedNear = isSprite
            ? (defaultCameraNear ?? camera.near)
            : Math.max(SELECTED_MODEL_CAMERA_NEAR_SCENE_UNITS, 1e-7);
        const selectedObserverFrame = isSprite ? null : computeSelectedModelObserverFrame(targetObject);
        if (selectedObserverFrame) {
            modelDiameter = selectedObserverFrame.modelDiameter;
            selectedNear = selectedObserverFrame.selectedNear;
        }
        const frame = selectedObserverFrame?.frame || selectedSatelliteCameraFrame(targetPos, {
            requestedMeters: SELECTED_SATELLITE_TARGET_METERS,
            modelDiameterSceneUnits: modelDiameter,
            cameraNearSceneUnits: selectedNear,
            earthRadiusSceneUnits: EARTH_SCENE_RADIUS,
            earthContextDistanceSceneUnits: isSprite ? EARTH_SCENE_RADIUS * 0.035 : 0,
            preservePhysicalDistance: !isSprite,
            observerDirectionScene: null
        });
        if (!frame) return;

        camera.near = Math.min(defaultCameraNear ?? camera.near, selectedNear);
        camera.far = Math.max(defaultCameraFar ?? camera.far, targetPos.length() + EARTH_SCENE_RADIUS * 4);
        camera.updateProjectionMatrix();

        controls.minDistance = Math.max(camera.near * 1.5, frame.observerDistanceSceneUnits * 0.15);
        controls.maxDistance = defaultControlsMaxDistance ?? EARTH_SCENE_RADIUS * 20;

        const endCamPos = selectedObserverFrame?.cameraPosition || new THREE.Vector3(
            frame.position.x,
            frame.position.y,
            frame.position.z
        );
        const endTarget = selectedObserverFrame?.cameraTarget || new THREE.Vector3(
            frame.target.x,
            frame.target.y,
            frame.target.z
        );
        if (selectedObserverFrame?.cameraUp) {
            camera.up.copy(selectedObserverFrame.cameraUp);
        } else if (defaultCameraUp) {
            camera.up.copy(defaultCameraUp);
        }
        targetObject.userData.selectedView = {
            requestedMeters: frame.requestedMeters,
            physicalDistanceSceneUnits: frame.physicalDistanceSceneUnits,
            readableDistanceSceneUnits: frame.readableDistanceSceneUnits,
            observerDistanceSceneUnits: frame.observerDistanceSceneUnits,
            approximationUsed: frame.approximationUsed,
            readableFallbackSuppressed: frame.readableFallbackSuppressed,
            preservePhysicalDistance: frame.preservePhysicalDistance,
            cameraNearSceneUnits: camera.near,
            modelDiameterSceneUnits: modelDiameter,
            viewportHeightFraction: selectedModelViewportHeightFraction({
                modelDiameterSceneUnits: modelDiameter,
                observerDistanceSceneUnits: frame.observerDistanceSceneUnits,
                cameraFovDeg: camera.fov
            }),
            visualFit: targetObject.userData.selectedModelVisualFit || null,
            earthFacingAxis: SELECTED_SATELLITE_MODEL_AXIS_NOTE,
            earthInView: selectedCameraFrameKeepsEarthInView(frame, {
                earthRadiusSceneUnits: EARTH_SCENE_RADIUS,
                cameraFovDeg: camera.fov
            }),
            observerPlacement: isSprite
                ? 'sprite-radial'
                : (selectedObserverFrame?.observerPlacement || 'selected-model-radial'),
            observerDirection: frame.observerDirection,
            cameraUp: selectedObserverFrame?.cameraUp
                ? {
                    x: selectedObserverFrame.cameraUp.x,
                    y: selectedObserverFrame.cameraUp.y,
                    z: selectedObserverFrame.cameraUp.z
                }
                : null
        };
        console.info(
            `[camera] Selected satellite observer target ${frame.requestedMeters} m; `
            + `using ${frame.observerDistanceSceneUnits} scene units `
            + `(physical ${frame.physicalDistanceSceneUnits}, model diameter ${modelDiameter}).`
        );
        if (isSprite) {
            disableSelectedModelTracking();
        } else {
            enableSelectedModelTracking(targetObject);
        }
        animateCameraTo(endCamPos, endTarget, millis);
    }

    function resetCameraToDefault() {
        if (camera && controls && sceneConfig?.camera?.position) {
            disableSelectedModelTracking();
            restoreEarthControlLimits();
            cameraMove = null;
            const startCamPos = camera.position.clone();
            const endCamPos = new THREE.Vector3(...sceneConfig.camera.position);
            const startTarget = controls.target.clone();
            const endTarget = new THREE.Vector3(0, 0, 0);
            cameraMove = {
                startTime: clock.getElapsedTime(),
                duration: 1.0,
                startCamPos, endCamPos,
                startTarget, endTarget
            };
            controls.enabled = false;
        }
    }

    function selectedSatelliteDisplayObject() {
        if (detailedSatelliteModel?.visible) return detailedSatelliteModel;
        return currentSelectedSatellite?.mesh || null;
    }

    function applySelectedSatelliteNadirOrientation(propagation = null) {
        const displayObject = selectedSatelliteDisplayObject();
        if (!displayObject) return null;
        const satPos = displayObject.position;
        let q = null;
        const isStarlinkModel = isStarlinkDetailedModel(displayObject);
        const isIssModel = isIssDetailedModel(displayObject);
        if (isStarlinkModel || isIssModel) {
            let pv = propagation;
            if (!pv?.velocity && currentSelectedSatellite?.satrec) {
                pv = satellite.propagate(currentSelectedSatellite.satrec, SIM_DATE);
            }
            const velocityScene = selectedSatelliteVelocitySceneFromPropagation(pv);
            if (velocityScene) {
                const calibrationYawDeg = isIssModel ? ISS_MODEL_CALIBRATION_YAW_DEG : STARLINK_MODEL_CALIBRATION_YAW_DEG;
                const calibrationPitchDeg = isIssModel ? ISS_MODEL_CALIBRATION_PITCH_DEG : 0;
                const calibrationRollDeg = isIssModel ? ISS_MODEL_CALIBRATION_ROLL_DEG : 0;
                const orientationBias = selectedSatelliteOrientationBias(isIssModel);
                q = selectedSatelliteOrbitalFrameQuaternion(Q_TMP1, satPos, velocityScene, {
                    yawDeg: orientationBias.yawDeg,
                    pitchDeg: orientationBias.pitchDeg,
                    rollDeg: orientationBias.rollDeg,
                    calibrationYawDeg,
                    calibrationPitchDeg,
                    calibrationRollDeg,
                    modelAxisMapping: isIssModel ? ISS_MODEL_AXIS_MAPPING : 'x-velocity-y-crosstrack-z-nadir'
                });
                if (q && detailedSatelliteModel?.userData) {
                    const orbitalFrame = currentSelectedOrbitalFrame(satPos, pv);
                    if (isIssModel) {
                        detailedSatelliteModel.userData.issOrbitalFrame = orbitalFrame;
                        detailedSatelliteModel.userData.orientationMode = 'iss-velocity-pitch-nadir-frame';
                        detailedSatelliteModel.userData.modelAxisMapping = '+X velocity, +Y pitch/nadir toward Earth, +Z negative right-handed cross-track';
                        detailedSatelliteModel.userData.pitchAxisEarthFacing = true;
                        detailedSatelliteModel.userData.calibrationYawDeg = calibrationYawDeg;
                        detailedSatelliteModel.userData.calibrationPitchDeg = calibrationPitchDeg;
                        detailedSatelliteModel.userData.calibrationRollDeg = calibrationRollDeg;
                        detailedSatelliteModel.userData.controlMapping = orientationBias.controlMapping;
                        detailedSatelliteModel.userData.controlYawDeg = simParams.yawDeg;
                        detailedSatelliteModel.userData.controlPitchDeg = simParams.pitchDeg;
                        detailedSatelliteModel.userData.appliedYawDeg = orientationBias.yawDeg;
                        detailedSatelliteModel.userData.appliedPitchDeg = orientationBias.pitchDeg;
                        if (!detailedSatelliteModel.userData.issOrientationCalibrationLogged) {
                            console.info('[model] ISS orientation calibration applied.', {
                                orientationMode: detailedSatelliteModel.userData.orientationMode,
                                modelAxisMapping: detailedSatelliteModel.userData.modelAxisMapping,
                                controlMapping: detailedSatelliteModel.userData.controlMapping,
                                controlYawDeg: detailedSatelliteModel.userData.controlYawDeg,
                                controlPitchDeg: detailedSatelliteModel.userData.controlPitchDeg,
                                appliedYawDeg: detailedSatelliteModel.userData.appliedYawDeg,
                                appliedPitchDeg: detailedSatelliteModel.userData.appliedPitchDeg,
                                calibrationYawDeg,
                                calibrationPitchDeg,
                                calibrationRollDeg
                            });
                            detailedSatelliteModel.userData.issOrientationCalibrationLogged = true;
                        }
                    } else {
                        detailedSatelliteModel.userData.starlinkOrbitalFrame = orbitalFrame;
                        detailedSatelliteModel.userData.orientationMode = 'starlink-velocity-nadir-frame';
                        detailedSatelliteModel.userData.modelAxisMapping = '+X velocity, +Z nadir, +Y right-handed cross-track';
                    }
                }
            } else if (!displayObject.userData?.orbitalVelocityFallbackWarned) {
                console.warn(`[model] ${isIssModel ? 'ISS' : 'Starlink'} velocity unavailable; falling back to nadir-only orientation.`);
                displayObject.userData.orbitalVelocityFallbackWarned = true;
            }
        }
        if (!q) {
            const fallbackBias = selectedSatelliteOrientationBias(isIssModel);
            q = nadirPointingQuaternion(Q_TMP1, satPos, {
                earthFacingAxis: isIssModel ? ISS_MODEL_EARTH_FACING_AXIS : SELECTED_SATELLITE_EARTH_FACING_AXIS,
                yawDeg: fallbackBias.yawDeg,
                pitchDeg: fallbackBias.pitchDeg,
                rollDeg: fallbackBias.rollDeg
            });
        }
        if (!q) return null;
        if (detailedSatelliteModel?.visible) {
            detailedSatelliteModel.quaternion.copy(q);
            detailedSatelliteModel.userData.earthFacingAxis = isIssModel
                ? ISS_MODEL_AXIS_NOTE
                : SELECTED_SATELLITE_MODEL_AXIS_NOTE;
        }
        return q;
    }

    function updateSatelliteList() {
        if (!satellites || !satelliteSelectDropdown || !companyFilterSelect) {
            if (satelliteCountDisplay) satelliteCountDisplay.textContent = '0';
            if (satelliteSelectDropdown) satelliteSelectDropdown.innerHTML = '<option value="None">None</option>';
            if (companyFilterSelect) {
                renderCompanyFilter([], simParams.companyFilter);
            }
            updateViewShortcutButtonsState();
            return;
        }

        const companiesForOrbit = getCompaniesForOrbitSelection(simParams.orbitTypeFilter);
        const previousCompanySelection = Array.from(simParams.companyFilter);
        const normalizedSelection = normalizeCompanySelection(
            previousCompanySelection.filter(val => val === ALL_COMPANY_OPTION || companiesForOrbit.includes(val))
        );
        renderCompanyFilter(companiesForOrbit, normalizedSelection);

        const filteredTLEs = buildFilteredSatellitesBySelection();
        if (satelliteSearchInput) {
            satelliteSearchInput.disabled = false;
            satelliteSearchInput.placeholder = 'Search satellite or NORAD ID';
        }
        if (satelliteSearchClearButton) satelliteSearchClearButton.disabled = false;

        const noradToRepresentative = new Map(
            filteredTLEs.map(s => [s.norad_id?.toString(), s])
        );

        satellites.forEach(s => {
            if (!s.mesh) return;

            const repForNorad = noradToRepresentative.get(s.norad_id?.toString());
            const isVisibleInFilter = repForNorad === s;

            const isDetailedModelForThisSat =
                detailedSatelliteModel &&
                detailedSatelliteModel.userData &&
                detailedSatelliteModel.userData.noradId === s.norad_id.toString();

            let visible = isVisibleInFilter && !isDetailedModelForThisSat;

            if (simParams.showOnlySelectedSatellite) {
                visible = !!currentSelectedSatellite &&
                    currentSelectedSatellite.norad_id === s.norad_id &&
                    !isDetailedModelForThisSat;
            }

            s.mesh.visible = visible;

            if (s.mesh.visible) {
                const isActuallySelected = currentSelectedSatellite && currentSelectedSatellite.norad_id === s.norad_id;
                s.mesh.material.color.set(isActuallySelected ? 0xff0000 : 0xffffff);
                const baseScale = satelliteConfig.scale || [0.1, 0.1, 0.1];
                s.mesh.scale.set(...(isActuallySelected ? baseScale.map(v => v * 1.5) : baseScale));
            }
        });

        if (satelliteCountDisplay) {
            satelliteCountDisplay.textContent =
                simParams.showOnlySelectedSatellite ? (currentSelectedSatellite ? '1' : '0') : filteredTLEs.length.toString();
        }
        updateFilterStatus(filteredTLEs);
        updateSelectedSatelliteSummary(currentSelectedSatellite);

        const previousDropdownValue = satelliteSelectDropdown.value;
        const dropdownFragment = document.createDocumentFragment();
        const noneOption = document.createElement('option');
        noneOption.value = 'None';
        noneOption.textContent = 'None';
        dropdownFragment.appendChild(noneOption);
        filteredTLEs.forEach(s => {
            const option = document.createElement('option');
            option.value = s.satellite_name;
            option.textContent = s.satellite_name;
            option.dataset.noradId = s.norad_id;
            dropdownFragment.appendChild(option);
        });
        satelliteSelectDropdown.replaceChildren(dropdownFragment);

        if (filteredTLEs.some(s => s.satellite_name === previousDropdownValue)) {
            satelliteSelectDropdown.value = previousDropdownValue;
        } else {
            satelliteSelectDropdown.value = "None";
            if (currentSelectedSatellite && !filteredTLEs.includes(currentSelectedSatellite)) {
                if (!simParams.showOnlySelectedSatellite) {
                    clearDetailedSatelliteView();
                    currentSelectedSatellite = null;
                    simParams.selectedSatelliteNoradId = null;
                    updateSelectedSatelliteSummary(null);
                    syncSatelliteSearchWithSelection();
                }
            }
        }

        if (satelliteSelectDropdown.value === "None" && detailedSatelliteModel && !simParams.showOnlySelectedSatellite) {
            clearDetailedSatelliteView();
            currentSelectedSatellite = null;
            simParams.selectedSatelliteNoradId = null;
            updateSelectedSatelliteSummary(null);
            syncSatelliteSearchWithSelection();
        }

        if (currentSelectedSatellite) {
            setSatelliteSelectToSatellite(currentSelectedSatellite);
        }
        renderSatelliteSearchResults(filteredTLEs, false);
        updateViewShortcutButtonsState();
        refreshShareControls();

        if (reentryTimelineHandle?.requestRedraw) {
            reentryTimelineHandle.requestRedraw();
        }
    }

    function selectSatelliteSprite(tleSatData) {
        satellites.forEach(s => {
            if (s.mesh && s.isSelected) {
                s.isSelected = false;
                if (s.mesh.visible) {
                    s.mesh.material.color.set(0xffffff);
                    s.mesh.scale.set(...(satelliteConfig.scale || [0.1, 0.1, 0.1]));
                }
            }
        });

        currentSelectedSatellite = tleSatData;

        if (tleSatData?.mesh) {
            simParams.selectedSatelliteNoradId = tleSatData.norad_id?.toString() || null;
            tleSatData.isSelected = true;
            if (tleSatData.mesh.visible) {
                tleSatData.mesh.material.color.set(0xff0000);
                tleSatData.mesh.scale.set(...(satelliteConfig.scale || [0.1, 0.1, 0.1]).map(v => v * 1.5));
            }
            simParams.selectedSatelliteName = tleSatData.satellite_name;
            setSatelliteSelectToSatellite(tleSatData);
            if (simParams.showOrbit) updateOrbitTrajectory(scene, simParams, tleSatData);
        } else {
            simParams.selectedSatelliteName = "None";
            simParams.selectedSatelliteNoradId = null;
            setShowOnlySelectedSatellite(false);
            if (satelliteSelectDropdown) satelliteSelectDropdown.value = "None";
            removeAllGeometry(scene);
        }
        updateSelectedSatelliteSummary(tleSatData);
        if (!tleSatData) syncSatelliteSearchWithSelection();
        if (simParams.showYPR) ensureYPRControlsVisibleForSelection();
    }

    function handleTimelineSelection(tleSatData) {
        if (!tleSatData) return;
        applyOrbitSelectionToUI(ORBIT_FILTER_OPTIONS);
        applyCompanySelectionToUI(DEFAULT_COMPANY_FILTER);
        applyDebrisFilterToUI(DEBRIS_FILTER_SHOW);
        updateSatelliteList();
        if (satelliteSelectDropdown) {
            setSatelliteSelectToSatellite(tleSatData);
            const changeEvent = new Event('change');
            satelliteSelectDropdown.dispatchEvent(changeEvent);
        }
        ensureYPRControlsVisibleForSelection();
    }

    window.addEventListener('keydown', e => {
        if (e.key === 'r') {
            disableSelectedModelTracking();
            cameraMove = null;
            restoreEarthControlLimits();
            controls.enabled = true;
            controls.reset();
            camera.position.set(...sceneConfig.camera.position);
            controls.target.set(0, 0, 0);
            controls.enablePan = false;
            enforceSceneOrigin();
        }
    });

    function formatUTCString(date) {
        const options = {
            weekday: 'short',
            year: 'numeric',
            month: 'long',
            day: '2-digit',
            timeZone: 'UTC',
        };
        const datePart = date.toLocaleDateString('en-US', options);
        const timePart = date.toUTCString().split(' ')[4]; // "HH:MM:SS"
        return `${timePart} UTC  ${datePart}`;
    }

    function animate() {
        requestAnimationFrame(animate);

        /* Camera easing */
        if (cameraMove) {
            const tReal = clock.getElapsedTime();
            const f = Math.min((tReal - cameraMove.startTime) / cameraMove.duration, 1);
            const s = f < 0.5 ? 2 * f * f : 1 - Math.pow(-2 * f + 2, 2) / 2;
            camera.position.lerpVectors(cameraMove.startCamPos, cameraMove.endCamPos, s);
            controls.target.lerpVectors(cameraMove.startTarget, cameraMove.endTarget, s);
            controls.update();
            if (f >= 1) { cameraMove = null; controls.enabled = true; }
        } else {
            if (!simParams.solarSystemOverview) {
                enforceActiveControlTarget();
            }
            controls.update();
        }

        /* Simulation clock: minutes * timeWarp per second */
        const dtReal = clock.getDelta();
        simMillis += dtReal * 1000 * 60 * simParams.timeWarp;
        SIM_DATE.setTime(simMillis);
        simParams.simDate = SIM_DATE; // keep external readers happy
        if (simParams.solarSystemOverview) {
            updateSolarSystemOverview(solarSystemOverview, SIM_DATE);
            setSolarSystemEarthLayerVisibility(true);
        }

        const jDay = satellite.jday(
            SIM_DATE.getUTCFullYear(), SIM_DATE.getUTCMonth() + 1, SIM_DATE.getUTCDate(),
            SIM_DATE.getUTCHours(), SIM_DATE.getUTCMinutes(), SIM_DATE.getUTCSeconds()
        );
        const gmstNow = satellite.gstime(jDay);
        const rotY = -gmstNow;

        // Update the UTC text ~2 Hz and the slider number immediately (cheap)
        const nowPerf = performance.now();
        if (nowPerf - lastClockUpdate > 500) {
            lastClockUpdate = nowPerf;
            const clockEl = document.getElementById("utcClockDisplay");
            if (clockEl) clockEl.textContent = formatUTCString(SIM_DATE);
            syncSelectedSatelliteDetailPanelWidth();
        }
        updateTimeWarpControls();

        /* Earth rotation */
        enforceSceneOrigin();
        if (earthMesh) earthMesh.rotation.y = rotY;
        updateECEFAxesOrientation(rotY);

        /* Visible TLE sprites */
        if (!simParams.solarSystemOverview) {
            for (const s of satellites) {
                if (!s.mesh || !s.mesh.visible || !s.satrec) continue;
                const pv = satellite.propagate(s.satrec, SIM_DATE);
                if (!isUsableOrbitPosition(pv?.position)) {
                    s.propagationInvalid = true;
                    s.mesh.visible = false;
                    continue;
                }
                s.propagationInvalid = false;
                eciToSceneVector(s.mesh.position, pv.position);
            }
        }

        /* Detailed model (selected) */
        let selectedPropagation = null;
        if (!simParams.solarSystemOverview && detailedSatelliteModel?.visible && currentSelectedSatellite?.satrec) {
            selectedPropagation = satellite.propagate(currentSelectedSatellite.satrec, SIM_DATE);
            if (setDetailedSatelliteModelPositionFromPropagation(selectedPropagation, 'animation-frame')) {
                applySelectedSatelliteNadirOrientation(selectedPropagation);
            } else {
                detailedSatelliteModel.visible = false;
            }
            if (selectedModelFillLight) {
                selectedModelFillLight.visible = detailedSatelliteModel?.visible === true;
            }
        } else if (selectedModelFillLight) {
            selectedModelFillLight.visible = false;
        }
        updateSelectedModelTracking(selectedPropagation);
        updateSelectedModelLighting(jDay);

        /* LVLH orbit frame (selected) */
        if (!simParams.solarSystemOverview && simParams.showOrbitFrame && orbitFrame && currentSelectedSatellite?.satrec && currentSelectedSatellite.mesh?.visible) {
            const pv = satellite.propagate(currentSelectedSatellite.satrec, SIM_DATE);
            if (isUsableOrbitPosition(pv?.position) && pv?.velocity) {
                updateOrbitFrame(
                    orbitFrame,
                    eciToSceneVector(V_TMP1, pv.position),
                    eciToSceneVector(V_TMP2, pv.velocity)
                );
            }
        }

        /* YPR frame */
        if (!simParams.solarSystemOverview && simParams.showYPR && yprFrame && currentSelectedSatellite?.satrec) {
            const displayObject = selectedSatelliteDisplayObject();
            if (displayObject) {
                const q = applySelectedSatelliteNadirOrientation();
                if (q) {
                    updateYPRFrameQuaternion(yprFrame, displayObject.position, q);
                } else {
                    updateYPRFrame(yprFrame, displayObject.position, simParams.yawDeg, simParams.pitchDeg, simParams.rollDeg);
                }
            }
        }

        /* Update contextual bodies before camera target enforcement. */
        if (moon) updateMoon(moon, SIM_DATE);
        if (mars) updateMars(mars, SIM_DATE);

        /* Moon/Mars controls target */
        if (!simParams.solarSystemOverview && !cameraMove && controls) {
            if ((simParams.otherSelection === 'Moon' && moon) || (simParams.otherSelection === 'Mars' && mars)) {
                const selectedBody = simParams.otherSelection === 'Moon' ? moon : mars;
                // Unit vector from Earth to selected body.
                V_TMP1.copy(selectedBody.position).normalize();
                const bodyRadius = selectedBody.userData?.radiusScene ||
                    selectedBody.geometry?.parameters?.radius ||
                    EARTH_SCENE_RADIUS * 0.27;
                const keepDist = Math.max(bodyRadius * 4, EARTH_SCENE_RADIUS * 0.6);
                V_TMP2.copy(V_TMP1).multiplyScalar(keepDist).add(selectedBody.position);

                // dt-aware smoothing keeps stable when Time x changes.
                const chaseSmooth = 1 - Math.pow(0.001, dtReal); // fast, stable
                //camera.position.lerp(V_TMP2, chaseSmooth);

                controls.target.copy(selectedBody.position);
                controls.update();
            } else if (!currentSelectedSatellite && !detailedSatelliteModel?.visible) {
                controls.target.set(0, 0, 0);
                controls.update();
            }
        }

        /* Footprints */
        updateFootprints(currentSelectedSatellite, gmstNow, {
            showFootprint: !!simParams.showFootprint && !simParams.solarSystemOverview,
            mercatorCtx: null,
            simDate: SIM_DATE
        });

        /* Sun light and Sun visuals must update before the 3-D render */
        drawDayNight3D(scene, earthMesh, SIM_DATE, {
            showSun:  simParams.showDayNight && simParams.view3D && !simParams.solarSystemOverview,
            showHalo: simParams.showDayNight && simParams.view3D && !simParams.solarSystemOverview,
            earthRadius: EARTH_SCENE_RADIUS,
            sunIntensity: SUN_LIGHT_INTENSITY
        });

        /* Render 3-D vs Mercator */
        const show3D = simParams.view3D || simParams.solarSystemOverview;
        if (renderer) renderer.domElement.style.display = show3D ? 'block' : 'none';
        if (show3D) {
            if (simParams.showOrbit && !simParams.solarSystemOverview) {
                refreshSelectedOrbitOcclusion(camera, { earthRadiusScene: EARTH_SCENE_RADIUS });
            }
            renderer.render(scene, camera);
            startupPerf.markOnce('first-visible-globe-render');
            if (!simParams.solarSystemOverview) {
                update3DLabelsPosition(camera, simParams, rotY);
            }
        } else {
            ['labelXecr','labelYecr','labelZecr','labelNorthPole','labelEquatorLine','labelGreenwichMeridian']
                .forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'none'; });
        }

        if (mercatorContainer) {
            if (simParams.viewMercator && !simParams.solarSystemOverview) {
                mercatorContainer.style.display = 'block';
                mercatorContainer.classList.toggle('fullscreen', !show3D);
                mercatorContainer.classList.toggle('globe-overlay', show3D);
                if (mercatorCanvasElement && mapBackgroundDiv) {
                    const w = mapBackgroundDiv.clientWidth;
                    const h = mapBackgroundDiv.clientHeight;
                    if (mercatorCanvasElement.width !== w || mercatorCanvasElement.height !== h) {
                        mercatorCanvasElement.width = w;
                        mercatorCanvasElement.height = h;
                    }
                    // Throttle Mercator to ~30 FPS
                    if (performance.now() - lastMercatorRedraw > 33) {
                        lastMercatorRedraw = performance.now();
                        updateMercatorMap(simParams);
                        const mercatorUsesEarthSatellites = simParams.otherSelection !== 'Mars';
                        if (mercatorUsesEarthSatellites && simParams.showFootprint) {
                            updateFootprints(currentSelectedSatellite, gmstNow, {
                                showFootprint: true, mercatorCtx, simDate: SIM_DATE
                            });
                        } else if (mercatorUsesEarthSatellites) {
                            updateFootprints(currentSelectedSatellite, gmstNow, {
                                showFootprint: false, mercatorCtx, simDate: SIM_DATE
                            });
                        }
                        if (mercatorUsesEarthSatellites && simParams.showOrbit && simParams.showFootprint) {
                            drawSelectedGroundTrack(simParams, mercatorCtx);
                        }
                    }
                }
            } else {
                mercatorContainer.style.display = 'none';
                mercatorContainer.classList.remove('fullscreen', 'globe-overlay');
            }
        }

    }

    function onWindowResize() {
        if (camera && renderer) {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        if (mercatorContainer && mercatorContainer.style.display !== 'none' && mapBackgroundDiv) {
            const w = mapBackgroundDiv.clientWidth;
            const h = mapBackgroundDiv.clientHeight;
            if (mercatorCanvasElement.width !== w || mercatorCanvasElement.height !== h) {
                mercatorCanvasElement.width = w;
                mercatorCanvasElement.height = h;
            }
        }
        syncSelectedSatelliteDetailPanelWidth();
    }
    window.addEventListener('resize', onWindowResize);

    async function start() {
        try {
            startupPerf.mark('startup-start');
            init3D();
            startupPerf.mark('scene-ready');
            yprFrame = createYPRFrame(scene);
            setYPRVisibility(yprFrame, false);
            initMercatorView();
            initFootprintRenderer(scene, earthMesh, mercatorCtx);
            setupHTMLControls();
            setSatelliteLoadingState('Loading satellites...');
            setTimelineButtonState('launchTimelineToggle', 'Loading satellite data...', true);
            setTimelineButtonState('reentryTimelineToggle', 'Loading satellite data...', true);
            updateECEFAxesVisibility(simParams);
            startupPerf.mark('controls-ready');
            startAnimationLoopOnce();

            startupPerf.mark('tle-load-start');
            const serverTleData = await checkAndLoadServerTleData();
            if (!serverTleData) {
                setServerConnectionState({ dataSource: 'local files' });
            }
            await setupTLESatellites(scene, {
                tleDataOverride: serverTleData,
                tleDataSource: serverTleData ? 'live server' : 'local files',
                chunkSize: SATELLITE_SETUP_CHUNK_SIZE,
                onProgress: ({ processed, total }) => {
                    if (satelliteCountDisplay) {
                        satelliteCountDisplay.textContent = `Loading ${processed}/${total}`;
                    }
                }
            });
            startupPerf.mark('satellite-data-ready', { count: satellites.length });
            updateSatelliteList();
            applyPendingShareStateAfterSatelliteLoad();
            startupPerf.markOnce('first-interactive-ui', { count: satellites.length });
            startupPerf.logSummary();
            scheduleDeferredStartupWork();

            if (simParams.showOrbit && currentSelectedSatellite) {
                updateOrbitTrajectory(scene, simParams, currentSelectedSatellite);
            } else {
                simParams.showOrbit = false;
                const t = document.getElementById('showOrbitToggle');
                if (t) t.checked = false;
            }

            startAnimationLoopOnce();
        } catch (e) {
            console.error("Critical error:", e);
        }
    }

    start();
</script>
