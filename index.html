    import {

    import { initFootprintRenderer, updateFootprints } from './js/satelliteFootprintLoader.js';

    import { initTimeline } from './js/ganttTimelineLoader.js';

    import { initReentryTimeline } from './js/reentryTimeline.js';
    import {

    // UI
    const perfLoggingEnabled = (() => {
        try {
            return new URLSearchParams(window.location.search).has('perf') ||
                localStorage.getItem('openbexiStartupPerf') === '1';
        } catch (err) {
            return false;
        }
    })();
    const startupPerf = createStartupPerformanceTracker({
        label: 'openbexi-earth-orbit',
        logEnabled: perfLoggingEnabled
    });
    startupPerf.mark('module-loaded');

    const versionNumber = "1.5.8";
    const versionRepoUrl = "https://github.com/arcazj/openbexi_earth_orbit";
    const versionText = `version ${versionNumber} - hosted at`;
    document.getElementById('ob_menu').innerHTML = satelliteMenuLoader();
    startupPerf.mark('menu-rendered');

    // -------------------------------------------------------------------------
    // Perf constants and reusable scratch objects
    // -------------------------------------------------------------------------
    const V_TMP1 = new THREE.Vector3();
    const V_TMP2 = new THREE.Vector3();
    const V_TMP3 = new THREE.Vector3();
    const V_TMP4 = new THREE.Vector3();
    const Q_TMP1 = new THREE.Quaternion();
    const AXIS_Y = new THREE.Vector3(0, 1, 0);
    const R2D = 180 / Math.PI;
    const SCENE_TO_KM = 1 / KM_TO_SCENE_UNITS;
    const SELECTED_SATELLITE_TARGET_METERS = 100;
    const SELECTED_MODEL_CAMERA_NEAR_METERS = 1;
    const SELECTED_MODEL_CAMERA_NEAR_SCENE_UNITS = metersToSceneUnits(SELECTED_MODEL_CAMERA_NEAR_METERS);
    const SATELLITE_SETUP_CHUNK_SIZE = 300;
    const DECAY_ESTIMATE_CHUNK_SIZE = 2;
    const MENU_COLLAPSE_STORAGE_KEY = 'openbexi.menu.collapsedSections';
    const DEFAULT_EXPANDED_ACCORDION_SECTIONS = new Set(['filtersContent', 'satelliteSelectionContent']);
    const DEFAULT_COLLAPSED_ACCORDION_SECTIONS = new Set(['viewContent', 'timelineContent', 'otherSelectionsContent', 'settingsContent']);
    const SATELLITE_SEARCH_LIMIT = 40;
    const EXCLUDED_COMPANY_FILTER_OPTIONS = new Set(['ACTIVE']);

    // Simulation time (reuse Date to avoid GC)
    let simMillis = Date.now();
    const SIM_DATE = new Date();

    // Throttles
    let lastClockUpdate = 0;      // ms
    let lastMercatorRedraw = 0;   // ms

    const readSetting = (key, fallback) => {
        try {
            const raw = localStorage.getItem(key);
            return raw === null ? fallback : JSON.parse(raw);
        } catch (e) {
            return fallback;
        }
    };
    const persistSetting = (key, value) => {
        try {
            localStorage.setItem(key, JSON.stringify(value));
        } catch (e) {
            // best-effort persistence
        }
    };

    // Helper: write ECEF -> scene into "out"
    function ecefToScene(out, x, y, z, rotY) {
        // Swap Y/Z for scene, rotate around Y, scale to scene units.
        return ecfToSceneVector(out, { x, y, z }, rotY);
    }

    function sceneToEcefKm(sceneVec, rotY) {
        // Inverse of ecefToScene: rotate back, un-swap axes, convert to km
        const unrotated = V_TMP4.copy(sceneVec)
            .multiplyScalar(SCENE_TO_KM)
            .applyAxisAngle(AXIS_Y, -rotY);

        return {
            x: unrotated.x,
            y: unrotated.z,
            z: unrotated.y
        };
    }

    function cartesianToLatLonDeg(vec) {
        const { x, y, z } = vec;
        const r = Math.sqrt(x * x + y * y + z * z);
        if (r === 0) return null;

        const latDeg = Math.asin(z / r) * R2D;
        const lonDeg = Math.atan2(y, x) * R2D;
        return { latDeg, lonDeg };
    }

    let moon;
    let scene, camera, renderer, earthMesh, controls;
    let defaultControlsMinDistance = null;
    let defaultControlsMaxDistance = null;
    let defaultCameraNear = null;
    let defaultCameraFar = null;
    let orbitFrame = null;
    let currentSelectedSatellite = null;
    let textureLoader;
    let detailedSatelliteModel = null;
    let satelliteModelLoadToken = 0;
    let selectedModelFillLight = null;
    let yprFrame;

    const ALL_COMPANY_OPTION = "ALL COMPANY";
    const ORBIT_ALL_OPTION = "ALL";
    const ORBIT_OTHER_OPTION = "OTHER";
    const ORBIT_CATEGORY_OPTIONS = ["GEO", "MEO", "LEO", "HEO", ORBIT_OTHER_OPTION];
    const ORBIT_FILTER_OPTIONS = [ORBIT_ALL_OPTION, ...ORBIT_CATEGORY_OPTIONS];
    const DEFAULT_ORBIT_FILTER = ["MEO"];
    const DEFAULT_COMPANY_FILTER = [ALL_COMPANY_OPTION];
    const DEBRIS_FILTER_SHOW = "show";
    const DEBRIS_FILTER_HIDE = "hide";
    const DEBRIS_FILTER_ONLY = "only";
    const COMPANY_LABEL_OVERRIDES = {
        [ALL_COMPANY_OPTION]: "All tags",
        BEIDOU: "BeiDou",
        EUTELSAT: "Eutelsat",
        GALILEO: "Galileo",
        GEO: "GEO",
        "GLO-OPS": "GLONASS",
        GLOBALSTAR: "Globalstar",
        "GPS-OPS": "GPS",
        INTELSAT: "Intelsat",
        "IRIDIUM-NEXT": "Iridium",
        KUIPER: "Kuiper",
        ONEWEB: "One Web",
        ORBCOMM: "Orbcomm",
        QIANFAN: "Qianfan",
        SATNOGS: "SatNOGS",
        SES: "SES",
        STARLINK: "Starlink",
        STATIONS: "Space Station",
        TDRSS: "Tracking and Data Relay",
        WEATHER: "Weather",
        "X-COMM": "X-Comm"
    };

    const simParams = {
        orbitTypeFilter: [...DEFAULT_ORBIT_FILTER],
        companyFilter: [...DEFAULT_COMPANY_FILTER],
        debrisFilter: DEBRIS_FILTER_SHOW,
        selectedSatelliteName: "None",
        selectedSatelliteNoradId: null,
        showOrbit: false,
        view3D: true,
        viewMercator: false,
        useHighDefTexture: false,
        showECEFAxes: false,
        showOrbitFrame: false,
        yawDeg: 0,
        pitchDeg: 0,
        rollDeg: 0,
        showYPR: false,
        showDayNight: true,
        simDate: new Date(),
        timeWarp: 1,
        showFootprint: false,
        showOnlySelectedSatellite: false,
        otherSelection: 'Earth'
    };

    let orbitTypeFilterSelect, companyFilterSelect, debrisFilterSelect, satelliteCountDisplay;
    let view3DToggle, viewMercatorToggle, showOrbitToggle, showOrbitFrameToggle;
    let highDefToggleElement, showECEFAxesToggleElement, showOrbitFrameToggleElement;
    let satelliteSelectDropdown, satelliteInfoDiv;
    let satelliteSearchInput, satelliteSearchResults, satelliteSearchClearButton, satelliteSearchEmpty;
    let filterStatusSummary, filterEmptyState, resetFiltersButton, resetFiltersEmptyButton, selectedSatelliteSummary;
    let currentSearchResults = [];
    let activeSearchResultIndex = -1;
    let isSatelliteDropdownOpen = false;
    let launchTimelineHandle = null;
    let reentryTimelineHandle = null;
    let animationLoopStarted = false;
    let deferredStartupWorkScheduled = false;
    let launchTimelineInitialized = false;
    let launchTimelineInitializing = false;
    let reentryTimelineInitializing = false;
    let controlsContainerElement, menuToggleBtnElement, versionDisplayElement;
    let labelXecrDiv, labelYecrDiv, labelZecrDiv, labelNorthPoleDiv, labelEquatorLineDiv, labelGreenwichMeridianDiv;

    function normalizeOrbitSelection(selection) {
        const values = Array.isArray(selection) ? selection : [selection];
        const cleaned = values
            .filter(Boolean)
            .map(value => value.toString().trim().toUpperCase());

        if (cleaned.includes(ORBIT_ALL_OPTION)) {
            return [...ORBIT_CATEGORY_OPTIONS];
        }

        return Array.from(new Set(cleaned.filter(value => ORBIT_CATEGORY_OPTIONS.includes(value))));
    }

    function isAllOrbitSelection(selection) {
        const normalized = normalizeOrbitSelection(selection);
        return normalized.length === ORBIT_CATEGORY_OPTIONS.length &&
            ORBIT_CATEGORY_OPTIONS.every(value => normalized.includes(value));
    }

    function getOrbitSelectionFromUI() {
        if (!orbitTypeFilterSelect) return [...DEFAULT_ORBIT_FILTER];
        return Array.from(
            orbitTypeFilterSelect.querySelectorAll('button[data-orbit-filter][aria-pressed="true"]')
        ).map(button => button.dataset.orbitFilter);
    }

    function applyOrbitSelectionToUI(selection) {
        const normalized = normalizeOrbitSelection(selection);
        simParams.orbitTypeFilter = normalized;

        if (!orbitTypeFilterSelect) return;
        const isAllSelected = isAllOrbitSelection(normalized);
        orbitTypeFilterSelect.querySelectorAll('button[data-orbit-filter]').forEach(button => {
            const value = button.dataset.orbitFilter;
            const isActive = value === ORBIT_ALL_OPTION
                ? isAllSelected
                : normalized.includes(value);
            button.classList.toggle('is-active', isActive);
            button.setAttribute('aria-pressed', isActive ? 'true' : 'false');
        });
    }

    function normalizeCompanySelection(selection) {
        const cleaned = Array.from(new Set((selection || [])
            .filter(Boolean)
            .filter(value => !EXCLUDED_COMPANY_FILTER_OPTIONS.has(value.toString().trim().toUpperCase()))));

        if (cleaned.includes(ALL_COMPANY_OPTION) && cleaned.length > 1) {
            return cleaned.filter(val => val !== ALL_COMPANY_OPTION);
        }
        if (cleaned.length === 0) {
            return [ALL_COMPANY_OPTION];
        }
        return cleaned;
    }

    function getCompanySelectionFromUI() {
        if (!companyFilterSelect) return [...DEFAULT_COMPANY_FILTER];
        return Array.from(
            companyFilterSelect.querySelectorAll('input[type="checkbox"]:checked')
        ).map(cb => cb.value);
    }

    function applyCompanySelectionToUI(selection) {
        if (!companyFilterSelect) return;
        const normalized = normalizeCompanySelection(selection);
        companyFilterSelect.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.checked = normalized.includes(cb.value);
        });
        simParams.companyFilter = normalized;
    }

    function formatCompanyLabel(companyName) {
        if (COMPANY_LABEL_OVERRIDES[companyName]) return COMPANY_LABEL_OVERRIDES[companyName];
        return companyName
            .toLowerCase()
            .split(/[-_\s]+/)
            .filter(Boolean)
            .map(part => part.charAt(0).toUpperCase() + part.slice(1))
            .join(' ');
    }

    function createCompanyCheckbox(value, labelText) {
        const label = document.createElement('label');
        label.className = 'filter-chip';

        const input = document.createElement('input');
        input.type = 'checkbox';
        input.value = value;
        input.name = 'tagFilter';
        input.setAttribute('aria-label', labelText);

        const textSpan = document.createElement('span');
        textSpan.textContent = labelText;

        label.appendChild(input);
        label.appendChild(textSpan);

        return label;
    }

    function renderCompanyFilter(companies, previousSelection = simParams.companyFilter) {
        if (!companyFilterSelect) return;

        const normalizedSelection = normalizeCompanySelection(previousSelection);
        companyFilterSelect.innerHTML = '';

        const options = [ALL_COMPANY_OPTION, ...companies];
        options.forEach(companyName => {
            const checkbox = createCompanyCheckbox(companyName, formatCompanyLabel(companyName));
            companyFilterSelect.appendChild(checkbox);
        });

        applyCompanySelectionToUI(normalizedSelection);
    }

    function companyMatchesSelection(company) {
        const selection = normalizeCompanySelection(simParams.companyFilter);
        return selection.includes(ALL_COMPANY_OPTION) || selection.includes(company);
    }

    function orbitMatchesSelection(orbitType, selection = simParams.orbitTypeFilter) {
        const normalized = normalizeOrbitSelection(selection);
        if (normalized.length === 0) return true;

        const type = (orbitType || "N/A").toString().trim().toUpperCase();
        if (normalized.includes(type)) return true;

        const isKnownOrbit = ORBIT_CATEGORY_OPTIONS
            .filter(value => value !== ORBIT_OTHER_OPTION)
            .includes(type);
        return normalized.includes(ORBIT_OTHER_OPTION) && !isKnownOrbit;
    }

    function isDebrisSatellite(satData) {
        const text = [satData?.satellite_name, satData?.company]
            .filter(Boolean)
            .join(' ')
            .toUpperCase();

        return /\b(DEB|DEBRIS)\b/.test(text) ||
            /\bR\/B\b/.test(text) ||
            /\bROCKET BODY\b/.test(text) ||
            /\bSTAGE\b/.test(text);
    }

    function debrisMatchesSelection(satData, mode = simParams.debrisFilter) {
        if (mode === DEBRIS_FILTER_HIDE) return !isDebrisSatellite(satData);
        if (mode === DEBRIS_FILTER_ONLY) return isDebrisSatellite(satData);
        return true;
    }

    function applyDebrisFilterToUI(mode) {
        simParams.debrisFilter = [DEBRIS_FILTER_HIDE, DEBRIS_FILTER_ONLY].includes(mode)
            ? mode
            : DEBRIS_FILTER_SHOW;

        if (!debrisFilterSelect) return;
        debrisFilterSelect.querySelectorAll('button[data-debris-filter]').forEach(button => {
            const isActive = button.dataset.debrisFilter === simParams.debrisFilter;
            button.classList.toggle('is-active', isActive);
            button.setAttribute('aria-pressed', isActive ? 'true' : 'false');
        });
    }

    function getCompaniesForOrbitSelection(orbitSelection) {
        if (!satellites) return [];

        return Array.from(new Set(
            satellites
                .filter(s => orbitMatchesSelection(s.orbitType, orbitSelection) &&
                    debrisMatchesSelection(s) &&
                    s.company &&
                    s.company !== "N/A" &&
                    !EXCLUDED_COMPANY_FILTER_OPTIONS.has(s.company.toString().trim().toUpperCase()))
                .map(s => s.company)
        )).sort();
    }

    function refreshFilteredSatelliteView() {
        simParams.showOrbit = false;
        if (showOrbitToggle) showOrbitToggle.checked = false;
        removeAllGeometry(scene);
        updateSatelliteList();
    }

    function setTimelineButtonState(id, text, disabled = false) {
        const control = document.getElementById(id);
        if (!control) return;
        const labelText = control.closest('label')?.querySelector('span');
        if (labelText) {
            labelText.textContent = text;
        } else {
            control.textContent = text;
        }
        control.disabled = !!disabled;
        control.setAttribute('aria-busy', disabled ? 'true' : 'false');
    }

    function setSatelliteLoadingState(text) {
        if (satelliteCountDisplay) satelliteCountDisplay.textContent = text;
        if (satelliteSelectDropdown) {
            satelliteSelectDropdown.innerHTML = `<option value="None">${text}</option>`;
            satelliteSelectDropdown.value = 'None';
        }
        if (satelliteSearchInput) {
            satelliteSearchInput.value = '';
            satelliteSearchInput.placeholder = text;
            satelliteSearchInput.disabled = true;
        }
        if (satelliteSearchClearButton) satelliteSearchClearButton.disabled = true;
    }

    function startAnimationLoopOnce() {
        if (animationLoopStarted) return;
        animationLoopStarted = true;
        startupPerf.markOnce('animation-loop-started');
        animate();
    }

    function scheduleDeferredStartupWork() {
        if (deferredStartupWorkScheduled) return;
        deferredStartupWorkScheduled = true;

        setTimelineButtonState('launchTimelineToggle', 'Preparing Launch Timeline...', true);
        setTimelineButtonState('reentryTimelineToggle', 'Preparing Re-entry Timeline...', true);

        scheduleDeferredWork(() => {
            initializeLaunchTimelineDeferred();
        }, { timeout: 1000 });

        scheduleDeferredWork(() => {
            initializeReentryTimelineDeferred().catch((err) => {
                console.error('Deferred re-entry timeline initialization failed:', err);
                setTimelineButtonState('reentryTimelineToggle', 'Re-entry Timeline Unavailable', true);
            });
        }, { timeout: 2000 });
    }

    function initializeLaunchTimelineDeferred() {
        if (launchTimelineInitialized || launchTimelineInitializing) return;
        launchTimelineInitializing = true;
        startupPerf.mark('launch-timeline-init-start');
        try {
            launchTimelineHandle = initTimeline(satellites, handleTimelineSelection);
            launchTimelineInitialized = true;
            setTimelineButtonState('launchTimelineToggle', 'Show Launch Timeline', false);
            startupPerf.mark('launch-timeline-ready', { count: satellites.length });
        } finally {
            launchTimelineInitializing = false;
        }
    }

    async function initializeReentryTimelineDeferred() {
        if (reentryTimelineHandle || reentryTimelineInitializing) return;
        reentryTimelineInitializing = true;
        try {
            startupPerf.mark('decay-data-load-start');
            const confirmedDecays = await loadConfirmedDecays();
            startupPerf.mark('decay-data-ready', { confirmed: confirmedDecays?.size || 0 });
            startupPerf.mark('decay-estimates-start', { count: satellites.length });

            const estimateDate = new Date();
            let lastProgressUpdate = 0;
            await processInChunks(
                satellites,
                (sat) => {
                    computeDecayEstimates([sat], { confirmedDecays, now: estimateDate });
                },
                {
                    chunkSize: DECAY_ESTIMATE_CHUNK_SIZE,
                    afterChunk: ({ processed, total }) => {
                        const now = performance.now();
                        if (now - lastProgressUpdate > 500 || processed === total) {
                            lastProgressUpdate = now;
                            setTimelineButtonState(
                                'reentryTimelineToggle',
                                `Preparing Re-entry Timeline ${processed}/${total}`,
                                true
                            );
                        }
                    }
                }
            );

            startupPerf.mark('decay-estimates-ready', { count: satellites.length });
            reentryTimelineHandle = initReentryTimeline(satellites, handleTimelineSelection);
            if (reentryTimelineHandle?.refreshData) {
                reentryTimelineHandle.refreshData();
            }
            setTimelineButtonState('reentryTimelineToggle', 'Show Re-entry Timeline', false);
            startupPerf.mark('reentry-timeline-ready', { count: satellites.length });
            startupPerf.logSummary();
        } finally {
            reentryTimelineInitializing = false;
        }
    }

    function hideTimelineById(toggleId) {
        const toggle = document.getElementById(toggleId);
        const handle = toggleId === 'launchTimelineToggle' ? launchTimelineHandle : reentryTimelineHandle;

        if (toggle?.checked) {
            toggle.checked = false;
            toggle.dispatchEvent(new Event('change', { bubbles: true }));
        }
        if (handle?.setVisible) {
            handle.setVisible(false);
        }
    }

    function syncExclusiveTimelineSelection(activeToggleId) {
        if (activeToggleId === 'launchTimelineToggle') {
            hideTimelineById('reentryTimelineToggle');
        } else if (activeToggleId === 'reentryTimelineToggle') {
            hideTimelineById('launchTimelineToggle');
        }
    }

    function buildFilteredSatellitesBySelection() {
        const seenNoradIds = new Set();
        const filtered = [];

        satellites.forEach((s) => {
            const matchesOrbit = orbitMatchesSelection(s.orbitType);
            const matchesCompany = companyMatchesSelection(s.company);
            const matchesDebris = debrisMatchesSelection(s);

            if (!matchesOrbit || !matchesCompany || !matchesDebris) return;

            const noradKey = s.norad_id?.toString();
            if (!noradKey) return;

            const isCurrentSelection = currentSelectedSatellite && currentSelectedSatellite.norad_id?.toString() === noradKey;

            if (!seenNoradIds.has(noradKey)) {
                seenNoradIds.add(noradKey);
                filtered.push(s);
            } else if (isCurrentSelection && !filtered.some(f => f.norad_id?.toString() === noradKey)) {
                // Ensure the currently selected satellite remains the representative for its NORAD id
                filtered.push(s);
            }
        });

        return filtered;
    }

    function debounceMenuStateWrite(key, value) {
        persistSetting(key, value);
    }

    function debrisFilterLabel(mode = simParams.debrisFilter) {
        if (mode === DEBRIS_FILTER_HIDE) return 'Debris hidden';
        if (mode === DEBRIS_FILTER_ONLY) return 'Debris only';
        return 'Debris shown';
    }

    function updateFilterStatus(filteredTLEs = []) {
        const orbitLabel = isAllOrbitSelection(simParams.orbitTypeFilter)
            ? 'ALL orbits'
            : normalizeOrbitSelection(simParams.orbitTypeFilter).join(' + ') || 'All orbits';
        const companySelection = normalizeCompanySelection(simParams.companyFilter);
        const companyLabel = companySelection.includes(ALL_COMPANY_OPTION)
            ? 'All tags'
            : companySelection.map(formatCompanyLabel).join(' + ');
        const count = filteredTLEs.length;
        if (filterStatusSummary) {
            filterStatusSummary.textContent = `${orbitLabel} + ${companyLabel} + ${debrisFilterLabel()} | ${count} satellites`;
        }
        if (filterEmptyState) {
            filterEmptyState.hidden = count !== 0;
        }
    }

    function updateSelectedSatelliteSummary(satData = currentSelectedSatellite) {
        if (!selectedSatelliteSummary) return;
        if (!satData) {
            selectedSatelliteSummary.textContent = 'No satellite selected';
            return;
        }
        selectedSatelliteSummary.textContent =
            `${satData.satellite_name || 'Selected satellite'} | NORAD ${satData.norad_id || 'N/A'} | ${satData.orbitType || 'N/A'} | ${satData.company || 'N/A'}`;
    }

    function setSatelliteSelectToSatellite(satData) {
        if (!satelliteSelectDropdown || !satData) return false;
        const norad = satData.norad_id?.toString();
        const option = Array.from(satelliteSelectDropdown.options)
            .find(opt => opt.dataset?.noradId === norad);
        if (option) {
            satelliteSelectDropdown.value = option.value;
            return true;
        }
        satelliteSelectDropdown.value = satData.satellite_name || 'None';
        return satelliteSelectDropdown.value === satData.satellite_name;
    }

    function satelliteSearchText(satData) {
        return [
            satData?.satellite_name,
            satData?.norad_id,
            satData?.orbitType,
            satData?.company
        ].filter(Boolean).join(' ').toLowerCase();
    }

    function satelliteSearchLabel(satData) {
        return satData?.satellite_name || `NORAD ${satData?.norad_id || 'unknown'}`;
    }

    function closeSatelliteSearchResults() {
        isSatelliteDropdownOpen = false;
        if (satelliteSearchResults) satelliteSearchResults.hidden = true;
        if (satelliteSearchInput) {
            satelliteSearchInput.setAttribute('aria-expanded', 'false');
            satelliteSearchInput.removeAttribute('aria-activedescendant');
        }
        activeSearchResultIndex = -1;
    }

    function renderSatelliteSearchResults(filteredTLEs = buildFilteredSatellitesBySelection(), forceOpen = false) {
        if (!satelliteSearchInput || !satelliteSearchResults) return;
        if (forceOpen) isSatelliteDropdownOpen = true;

        const query = satelliteSearchInput.value.trim().toLowerCase();
        const matches = query
            ? filteredTLEs.filter(s => satelliteSearchText(s).includes(query))
            : filteredTLEs.slice(0, Math.min(12, SATELLITE_SEARCH_LIMIT));

        currentSearchResults = matches.slice(0, SATELLITE_SEARCH_LIMIT);
        if (activeSearchResultIndex >= currentSearchResults.length) activeSearchResultIndex = currentSearchResults.length - 1;
        if (activeSearchResultIndex < -1) activeSearchResultIndex = -1;

        satelliteSearchResults.innerHTML = '';
        currentSearchResults.forEach((sat, index) => {
            const item = document.createElement('li');
            item.id = `satelliteSearchOption-${index}`;
            item.className = `satellite-search-option${index === activeSearchResultIndex ? ' is-active' : ''}`;
            item.setAttribute('role', 'option');
            item.setAttribute('aria-selected', index === activeSearchResultIndex ? 'true' : 'false');
            item.dataset.noradId = sat.norad_id;
            const title = document.createElement('strong');
            title.textContent = satelliteSearchLabel(sat);
            const meta = document.createElement('small');
            meta.textContent = `NORAD ${sat.norad_id || 'N/A'} | ${sat.orbitType || 'N/A'} | ${sat.company || 'N/A'}`;
            item.append(title, meta);
            item.addEventListener('mousedown', (event) => {
                event.preventDefault();
                selectSatelliteFromSearch(index);
            });
            satelliteSearchResults.appendChild(item);
        });

        const hasResults = currentSearchResults.length > 0;
        const shouldOpen = hasResults && isSatelliteDropdownOpen;
        satelliteSearchResults.hidden = !hasResults || !shouldOpen;
        satelliteSearchInput.setAttribute('aria-expanded', !satelliteSearchResults.hidden ? 'true' : 'false');
        if (activeSearchResultIndex >= 0 && !satelliteSearchResults.hidden) {
            satelliteSearchInput.setAttribute('aria-activedescendant', `satelliteSearchOption-${activeSearchResultIndex}`);
        } else {
            satelliteSearchInput.removeAttribute('aria-activedescendant');
        }
        if (satelliteSearchEmpty) {
            satelliteSearchEmpty.hidden = !(query.length > 0 && !hasResults);
        }
    }

    function selectSatelliteFromSearch(index) {
        const sat = currentSearchResults[index];
        if (!sat || !satelliteSelectDropdown) return;
        setSatelliteSelectToSatellite(sat);
        satelliteSearchInput.value = satelliteSearchLabel(sat);
        closeSatelliteSearchResults();
        satelliteSelectDropdown.dispatchEvent(new Event('change'));
    }

    function syncSatelliteSearchWithSelection() {

    function setAccordionSectionCollapsed(targetId, collapsed, collapsedSections = null) {
        const targetContent = document.getElementById(targetId);
        const header = document.querySelector(`#controlsContainer h3[data-collapsible-target="${targetId}"]`);
        const icon = header?.querySelector('.toggle-icon');
        if (!targetContent || !header) return;

        targetContent.classList.toggle('collapsed', collapsed);
        if (icon) {
            icon.classList.toggle('collapsed', collapsed);
            icon.textContent = collapsed ? '>' : 'v';
        }
        header.setAttribute('aria-expanded', collapsed ? 'false' : 'true');

        if (collapsedSections) {
            if (collapsed) collapsedSections.add(targetId);
            else collapsedSections.delete(targetId);
            DEFAULT_EXPANDED_ACCORDION_SECTIONS.forEach(id => collapsedSections.delete(id));
        }
    }

    function updateEarthTexture() {
        if (!earthMesh || !textureLoader || !earthConfig) return;

        const textureToLoad = simParams.useHighDefTexture ? earthConfig.texture : earthConfig.textureLight;
        if (!textureToLoad) {
            earthMesh.material.map = null;
            earthMesh.material.color.set(0x1a237e);
            earthMesh.material.needsUpdate = true;
            return;
        }

        textureLoader.load(
            textureToLoad,
            (texture) => {
                // Reasonable defaults for globe (keep mipmaps for quality)
                texture.anisotropy = renderer.capabilities.getMaxAnisotropy?.() || 1;
                earthMesh.material.map = texture;
                earthMesh.material.color.set(0xffffff);
                earthMesh.material.needsUpdate = true;
            },
            undefined,
            () => {
                const placeholderUrl = `https://placehold.co/${simParams.useHighDefTexture ? '4096x2048' : '1024x512'}/1c313a/ffffff?text=Earth+Texture+Load+Error`;
                textureLoader.load(placeholderUrl, (fallbackMap) => {
                    earthMesh.material.map = fallbackMap;
                    earthMesh.material.needsUpdate = true;
                });
            }
        );
    }

    function init3D() {
        /* Scene, Camera, Renderer */
        scene = new THREE.Scene();

        camera = new THREE.PerspectiveCamera(
            sceneConfig.camera.fov,
            window.innerWidth / window.innerHeight,
            sceneConfig.camera.near,
            sceneConfig.camera.far
        );
        camera.position.set(...sceneConfig.camera.position);
        defaultCameraNear = camera.near;
        defaultCameraFar = camera.far;

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        // Keep global shadows on; Sun light in drawDayNight3D has shadows disabled by default
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // expose
        window.renderer = renderer;
        window.camera = camera;

        /* Lighting */
        scene.add(new THREE.AmbientLight(0xffffff, 0.15));

        const dirLight = new THREE.DirectionalLight(
            sceneConfig.directionalLight.color,
            sceneConfig.directionalLight.intensity
        );
        dirLight.position.set(...sceneConfig.directionalLight.position);
        // Keep shadows off on helper light to save perf
        dirLight.castShadow = false;
        scene.add(dirLight);

        selectedModelFillLight = new THREE.PointLight(0xffffff, 2.0, 0, 1.5);
        selectedModelFillLight.visible = false;
        scene.add(selectedModelFillLight);

        /* Earth */
        textureLoader = new THREE.TextureLoader();
        const earthMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
        earthMat.depthTest = true;
        earthMat.depthWrite = true;
        earthMat.transparent = false;
        earthMesh = new THREE.Mesh(
            new THREE.SphereGeometry(EARTH_SCENE_RADIUS, 64, 64),
            earthMat
        );
        earthMesh.receiveShadow = true;
        earthMesh.renderOrder = 0;
        scene.add(earthMesh);
        updateEarthTexture();

        /* ECEF Axes */
        addECEFAxes(scene);
        updateECEFAxesVisibility(simParams);

        /* LVLH */
        orbitFrame = createOrbitFrame(scene);
        setOrbitFrameVisibility(orbitFrame, false);

        /* Moon (always visible) */
        moon = createMoon(scene, EARTH_SCENE_RADIUS, {
            textureUrl: 'textures/moon_map2.jpg'
        });

        /* Controls */
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = controlsConfig.enableDamping;
        controls.dampingFactor = controlsConfig.dampingFactor;
        controls.minDistance = EARTH_SCENE_RADIUS * 1.4;
        controls.maxDistance = EARTH_SCENE_RADIUS * 20;
        defaultControlsMinDistance = controls.minDistance;
        defaultControlsMaxDistance = controls.maxDistance;
        controls.enableZoom = true;
    }

    async function handleSatelliteDropdownChange(event) {
        const selectionToken = ++satelliteModelLoadToken;
        const selectedNameInDropdown = event.target.value;
        const selectedOption = event.target.selectedOptions?.[0];
        const selectedNoradId = selectedOption?.dataset?.noradId;
        simParams.selectedSatelliteName = selectedNameInDropdown;

        if (detailedSatelliteModel?.userData?.noradId) {
            const prevTleSat = satellites.find(s => s.norad_id.toString() === detailedSatelliteModel.userData.noradId.toString());
            if (prevTleSat?.mesh) {
                prevTleSat.mesh.visible = true;
                prevTleSat.isSelected = false;
                prevTleSat.mesh.material.color.set(0xffffff);
                prevTleSat.mesh.scale.set(...(satelliteConfig.scale || [0.1, 0.1, 0.1]));
            }
        }

        clearDetailedSatelliteView();
        removeAllGeometry(scene);

        if (selectedNameInDropdown === "None") {
            currentSelectedSatellite = null;
            simParams.selectedSatelliteNoradId = null;
            updateSatelliteInfo(satelliteInfoDiv, null);
            updateSelectedSatelliteSummary(null);
            syncSatelliteSearchWithSelection();
            resetCameraToDefault();

            if (simParams.showOnlySelectedSatellite) {
                satellites.forEach(s => { if (s.mesh) s.mesh.visible = false; });
                if (satelliteCountDisplay) satelliteCountDisplay.textContent = '0';
            } else {
                updateSatelliteList();
            }
            ensureYPRControlsVisibleForSelection();
            return;
        }

        let tleSatData = selectedNoradId
            ? satellites.find(s => s.norad_id.toString() === selectedNoradId)
            : null;

        if (!tleSatData) {
            tleSatData = satellites.find(s => s.satellite_name === selectedNameInDropdown);
        }
        if (!tleSatData) {
            currentSelectedSatellite = null;
            simParams.selectedSatelliteNoradId = null;
            updateSatelliteInfo(satelliteInfoDiv, null);
            if (satelliteSelectDropdown) satelliteSelectDropdown.value = "None";
            simParams.selectedSatelliteName = "None";
            updateSelectedSatelliteSummary(null);
            syncSatelliteSearchWithSelection();
            updateSatelliteList();
            ensureYPRControlsVisibleForSelection();
            return;
        }

        currentSelectedSatellite = tleSatData;
        simParams.selectedSatelliteNoradId = tleSatData.norad_id?.toString() || null;
        updateSatelliteInfo(satelliteInfoDiv, tleSatData);
        updateSelectedSatelliteSummary(tleSatData);
        if (satelliteSearchInput) satelliteSearchInput.value = satelliteSearchLabel(tleSatData);
        ensureYPRControlsVisibleForSelection();

        if (simParams.showOnlySelectedSatellite) {
            satellites.forEach(s => { if (s.mesh) s.mesh.visible = (s === tleSatData); });
        }

        if (simParams.showOrbit) {
            updateOrbitTrajectory(scene, simParams, tleSatData);
        }

        selectSatelliteSprite(tleSatData);

        const modelResolution = resolveSatelliteModel(tleSatData);
        if (!modelResolution.found) {
            console.warn(
                `[model] ${tleSatData.satellite_name}: ${modelResolution.reason}. Using selected sprite fallback.`
            );
            if (tleSatData.mesh) flyCameraToSelectedSatellite(tleSatData.mesh, 1000, true);
            updateSatelliteList();
        } else {
            console.info(
                `[model] ${tleSatData.satellite_name}: resolved local model "${modelResolution.assetId}" (${modelResolution.reason}).`,
                { attemptedPaths: modelResolution.attemptedPaths }
            );

            const verifiedModel = await verifyResolvedModelAsset(modelResolution, checkFileExists);
            if (selectionToken !== satelliteModelLoadToken || currentSelectedSatellite !== tleSatData) {
                console.info(`[model] ${tleSatData.satellite_name}: ignored stale model lookup result.`);
                return;
            }

            if (verifiedModel.exists) {
                await loadAndDisplayDetailedSatellite(tleSatData.norad_id, tleSatData, verifiedModel, selectionToken);
                if (selectionToken !== satelliteModelLoadToken || currentSelectedSatellite !== tleSatData) return;
                if (simParams.showOnlySelectedSatellite) updateSatelliteList();
            } else {
                const checkedPaths = (verifiedModel.checkedPaths || [])
                    .map(check => `${check.path}:${check.ok ? 'ok' : 'missing'}`)
                    .join(', ');
                console.warn(
                    `[model] ${tleSatData.satellite_name}: local model files not found for "${verifiedModel.assetId}". `
                    + `Checked ${checkedPaths || 'no paths'}. Using selected sprite fallback.`
                );
                if (tleSatData.mesh) flyCameraToSelectedSatellite(tleSatData.mesh, 1000, true);
                updateSatelliteList();
            }
        }

        ensureYPRControlsVisibleForSelection();
    }

    async function loadAndDisplayDetailedSatellite(noradId, tleSatData, modelResolution, selectionToken) {
        const resolvedModel = typeof modelResolution === 'string'
            ? {
                assetId: modelResolution,
                metadataId: modelResolution.replace(/\.[^.]+$/, ''),
                kind: /\.glb$/i.test(modelResolution) ? 'glb' : 'obj-mtl',
                attemptedPaths: []
            }
            : modelResolution;
        const isCurrentSelection = () =>
            selectionToken === satelliteModelLoadToken && currentSelectedSatellite === tleSatData;

        console.info(
            `[model] ${tleSatData?.satellite_name || noradId}: loading "${resolvedModel.assetId}".`,
            { attemptedPaths: resolvedModel.attemptedPaths }
        );
        const newModel = await showSatellite(noradId, scene, resolvedModel.assetId, {
            assetId: resolvedModel.assetId,
            metadataId: resolvedModel.metadataId,
            kind: resolvedModel.kind,
            attemptedPaths: resolvedModel.attemptedPaths,
            shouldAttach: isCurrentSelection,
            usePlaceholderOnFailure: false
        });

        if (!isCurrentSelection()) return;

        const modelVisibility = newModel?.userData?.modelVisibility;
        const hasVisibleModel = !!newModel && modelVisibility?.visible !== false;

        if (hasVisibleModel) {
            detailedSatelliteModel = newModel;
            detailedSatelliteModel.userData.noradId = noradId;
            detailedSatelliteModel.userData.modelResolution = resolvedModel;
            console.info(
                `[model] ${tleSatData.satellite_name}: confirmed visible detailed model.`,
                modelVisibility
            );

            if (tleSatData?.satrec) {
                currentSelectedSatellite = tleSatData;
                simParams.selectedSatelliteNoradId = tleSatData.norad_id?.toString() || null;
                tleSatData.isSelected = true;
                if (tleSatData.mesh) {
                    tleSatData.mesh.visible = false;
                }

                // Initial model position
                const now = SIM_DATE; // reuse
                const pv = satellite.propagate(tleSatData.satrec, now);
                if (pv?.position) {
                    eciToSceneVector(detailedSatelliteModel.position, pv.position);
                    applySelectedSatelliteNadirOrientation();
                }
            } else {
                currentSelectedSatellite = tleSatData;
                simParams.selectedSatelliteNoradId = tleSatData?.norad_id?.toString() || null;
            }

            satellites.forEach(s => {
                if (s !== tleSatData && s.mesh) {
                    s.isSelected = false;
                    s.mesh.material.color.set(0xffffff);
                    s.mesh.scale.set(...(satelliteConfig.scale || [0.1, 0.1, 0.1]));
                }
            });

            flyCameraToSelectedSatellite(detailedSatelliteModel, 1500, false);
            if (simParams.showOrbit && currentSelectedSatellite) {
                updateOrbitTrajectory(scene, simParams, currentSelectedSatellite);
            }
            console.info(`[model] ${tleSatData.satellite_name}: detailed model "${resolvedModel.assetId}" displayed.`);
        } else {
            if (tleSatData) {
                console.warn(
                    `[model] ${tleSatData.satellite_name}: failed to load "${resolvedModel.assetId}". Using selected sprite fallback.`
                );
                selectSatelliteSprite(tleSatData);
                if (tleSatData.mesh) flyCameraToSelectedSatellite(tleSatData.mesh, 1000, true);
            } else {
                if (satelliteSelectDropdown) satelliteSelectDropdown.value = "None";
                simParams.selectedSatelliteName = "None";
                currentSelectedSatellite = null;
                simParams.selectedSatelliteNoradId = null;
                resetCameraToDefault();
            }
            const errorDiv = document.createElement('div');
            errorDiv.style.cssText = "position:fixed; top:10px; left:10px; padding:10px; background:orange; color:black; z-index:1000;";
            errorDiv.innerText = `Failed to load 3D model for satellite NORAD ID: ${noradId}. Displaying TLE marker.`;
            document.body.appendChild(errorDiv);
            setTimeout(() => errorDiv.remove(), 5000);
        }
    }

    function clearDetailedSatelliteView() {
        if (detailedSatelliteModel) {
            const oldNoradId = detailedSatelliteModel.userData ? detailedSatelliteModel.userData.noradId : null;
            clearCurrentDetailedSat(scene);
            scene.remove(detailedSatelliteModel);
            detailedSatelliteModel = null;
            if (selectedModelFillLight) selectedModelFillLight.visible = false;

            if (oldNoradId) {
                const tleSat = satellites.find(s => s.norad_id.toString() === oldNoradId.toString());
                if (tleSat?.mesh) {
                    tleSat.mesh.visible = true;
                }
            }
        }
    }

    const clock = new THREE.Clock();
    let cameraMove = null;

    function restoreEarthControlLimits() {
        if (!controls) return;
        if (defaultControlsMinDistance !== null) controls.minDistance = defaultControlsMinDistance;
        if (defaultControlsMaxDistance !== null) controls.maxDistance = defaultControlsMaxDistance;
        if (camera) {
            if (defaultCameraNear !== null) camera.near = defaultCameraNear;
            if (defaultCameraFar !== null) camera.far = defaultCameraFar;
            camera.updateProjectionMatrix();
        }
        if (selectedModelFillLight) selectedModelFillLight.visible = false;
    }

    function getObjectVisualDiameter(targetObject, fallbackDiameter = 0) {
        if (!targetObject) return fallbackDiameter;
        const bbox = new THREE.Box3().setFromObject(targetObject);
        if (typeof bbox.isEmpty === 'function' && bbox.isEmpty()) return fallbackDiameter;
        const size = V_TMP1;
        bbox.getSize(size);
        const diameter = Math.max(size.x || 0, size.y || 0, size.z || 0);
        return Number.isFinite(diameter) && diameter > 0
            ? Math.max(diameter, fallbackDiameter)
            : fallbackDiameter;
    }

    function animateCameraTo(endCamPos, endTarget, millis = 1500) {
        if (!camera || !controls || !endCamPos || !endTarget) return;
        const startCamPos = camera.position.clone();
        const startTarget = controls.target.clone();

        cameraMove = {
            startTime: clock.getElapsedTime(),
            duration: millis / 1000,
            startCamPos,
            endCamPos: endCamPos.clone(),
            startTarget,
            endTarget
        };

        controls.enabled = false;
    }

    function flyCameraToObject(targetObject, millis = 1500) {
        if (!targetObject || !camera || !controls) return;
        targetObject.updateMatrixWorld(true);
        const targetPos = V_TMP2.setFromMatrixPosition(targetObject.matrixWorld);
        const outward = V_TMP3.copy(targetPos).normalize();
        const diameter = getObjectVisualDiameter(targetObject, EARTH_SCENE_RADIUS * 0.25);
        const distance = Math.max(diameter * 4, EARTH_SCENE_RADIUS * 0.6);
        const endCamPos = outward.multiplyScalar(distance).add(targetPos).clone();
        animateCameraTo(endCamPos, targetPos.clone(), millis);
    }

    function flyCameraToSelectedSatellite(targetObject, millis = 1500, isSprite = false) {
        if (!targetObject || !camera || !controls) return;
        if (!simParams.view3D) return;
        targetObject.updateMatrixWorld(true);

        const targetPos = V_TMP2.setFromMatrixPosition(targetObject.matrixWorld);
        const spriteDiameter = Math.max(...(satelliteConfig.scale || [0.25, 0.25, 1]));
        const modelDiameter = isSprite
            ? spriteDiameter
            : getObjectVisualDiameter(targetObject, spriteDiameter);
        const selectedNear = isSprite
            ? (defaultCameraNear ?? camera.near)
            : Math.max(SELECTED_MODEL_CAMERA_NEAR_SCENE_UNITS, 1e-7);
        const frame = selectedSatelliteCameraFrame(targetPos, {
            requestedMeters: SELECTED_SATELLITE_TARGET_METERS,
            modelDiameterSceneUnits: modelDiameter,
            cameraNearSceneUnits: selectedNear,
            earthRadiusSceneUnits: EARTH_SCENE_RADIUS,
            earthContextDistanceSceneUnits: isSprite ? EARTH_SCENE_RADIUS * 0.035 : 0
        });
        if (!frame) return;

        camera.near = Math.min(defaultCameraNear ?? camera.near, selectedNear);
        camera.far = Math.max(defaultCameraFar ?? camera.far, targetPos.length() + EARTH_SCENE_RADIUS * 4);
        camera.updateProjectionMatrix();

        controls.minDistance = Math.max(camera.near * 1.5, frame.observerDistanceSceneUnits * 0.15);
        controls.maxDistance = defaultControlsMaxDistance ?? EARTH_SCENE_RADIUS * 20;

        const endCamPos = new THREE.Vector3(
            frame.position.x,
            frame.position.y,
            frame.position.z
        );
        const endTarget = new THREE.Vector3(
            frame.target.x,
            frame.target.y,
            frame.target.z
        );
        targetObject.userData.selectedView = {
            requestedMeters: frame.requestedMeters,
            physicalDistanceSceneUnits: frame.physicalDistanceSceneUnits,
            observerDistanceSceneUnits: frame.observerDistanceSceneUnits,
            approximationUsed: frame.approximationUsed,
            cameraNearSceneUnits: camera.near,
            modelDiameterSceneUnits: modelDiameter,
            earthFacingAxis: SELECTED_SATELLITE_MODEL_AXIS_NOTE
        };
        console.info(
            `[camera] Selected satellite observer target ${frame.requestedMeters} m; `
            + `using ${frame.observerDistanceSceneUnits} scene units `
            + `(physical ${frame.physicalDistanceSceneUnits}, model diameter ${modelDiameter}).`
        );
        animateCameraTo(endCamPos, endTarget, millis);
    }

    function resetCameraToDefault() {
        if (camera && controls && sceneConfig?.camera?.position) {
            restoreEarthControlLimits();
            cameraMove = null;
            const startCamPos = camera.position.clone();
            const endCamPos = new THREE.Vector3(...sceneConfig.camera.position);
            const startTarget = controls.target.clone();
            const endTarget = new THREE.Vector3(0, 0, 0);
            cameraMove = {
                startTime: clock.getElapsedTime(),
                duration: 1.0,
                startCamPos, endCamPos,
                startTarget, endTarget
            };
            controls.enabled = false;
        }
    }

    function selectedSatelliteDisplayObject() {
        if (detailedSatelliteModel?.visible) return detailedSatelliteModel;
        return currentSelectedSatellite?.mesh || null;
    }

    function applySelectedSatelliteNadirOrientation() {
        const displayObject = selectedSatelliteDisplayObject();
        if (!displayObject) return null;
        const satPos = displayObject.position;
        const q = nadirPointingQuaternion(Q_TMP1, satPos, {
            earthFacingAxis: SELECTED_SATELLITE_EARTH_FACING_AXIS,
            yawDeg: simParams.yawDeg,
            pitchDeg: simParams.pitchDeg,
            rollDeg: simParams.rollDeg
        });
        if (!q) return null;
        if (detailedSatelliteModel?.visible) {
            detailedSatelliteModel.quaternion.copy(q);
            detailedSatelliteModel.userData.earthFacingAxis = SELECTED_SATELLITE_MODEL_AXIS_NOTE;
        }
        return q;
    }

    function updateSatelliteList() {
        if (!satellites || !satelliteSelectDropdown || !companyFilterSelect) {
            if (satelliteCountDisplay) satelliteCountDisplay.textContent = '0';
            if (satelliteSelectDropdown) satelliteSelectDropdown.innerHTML = '<option value="None">None</option>';
            if (companyFilterSelect) {
                renderCompanyFilter([], simParams.companyFilter);
            }
            return;
        }

        const companiesForOrbit = getCompaniesForOrbitSelection(simParams.orbitTypeFilter);
        const previousCompanySelection = Array.from(simParams.companyFilter);
        const normalizedSelection = normalizeCompanySelection(
            previousCompanySelection.filter(val => val === ALL_COMPANY_OPTION || companiesForOrbit.includes(val))
        );
        renderCompanyFilter(companiesForOrbit, normalizedSelection);

        const filteredTLEs = buildFilteredSatellitesBySelection();
        if (satelliteSearchInput) {
            satelliteSearchInput.disabled = false;
            satelliteSearchInput.placeholder = 'Search satellite or NORAD ID';
        }
        if (satelliteSearchClearButton) satelliteSearchClearButton.disabled = false;

        const noradToRepresentative = new Map(
            filteredTLEs.map(s => [s.norad_id?.toString(), s])
        );

        satellites.forEach(s => {
            if (!s.mesh) return;

            const repForNorad = noradToRepresentative.get(s.norad_id?.toString());
            const isVisibleInFilter = repForNorad === s;

            const isDetailedModelForThisSat =
                detailedSatelliteModel &&
                detailedSatelliteModel.userData &&
                detailedSatelliteModel.userData.noradId === s.norad_id.toString();

            let visible = isVisibleInFilter && !isDetailedModelForThisSat;

            if (simParams.showOnlySelectedSatellite) {
                visible = isVisibleInFilter &&
                    !!currentSelectedSatellite &&
                    currentSelectedSatellite.norad_id === s.norad_id &&
                    !isDetailedModelForThisSat;
            }

            s.mesh.visible = visible;

            if (s.mesh.visible) {
                const isActuallySelected = currentSelectedSatellite && currentSelectedSatellite.norad_id === s.norad_id;
                s.mesh.material.color.set(isActuallySelected ? 0xff0000 : 0xffffff);
                const baseScale = satelliteConfig.scale || [0.1, 0.1, 0.1];
                s.mesh.scale.set(...(isActuallySelected ? baseScale.map(v => v * 1.5) : baseScale));
            }
        });

        if (satelliteCountDisplay) {
            satelliteCountDisplay.textContent =
                simParams.showOnlySelectedSatellite ? (currentSelectedSatellite ? '1' : '0') : filteredTLEs.length.toString();
        }
        updateFilterStatus(filteredTLEs);
        updateSelectedSatelliteSummary(currentSelectedSatellite);

        const previousDropdownValue = satelliteSelectDropdown.value;
        const dropdownFragment = document.createDocumentFragment();
        const noneOption = document.createElement('option');
        noneOption.value = 'None';
        noneOption.textContent = 'None';
        dropdownFragment.appendChild(noneOption);
        filteredTLEs.forEach(s => {
            const option = document.createElement('option');
            option.value = s.satellite_name;
            option.textContent = s.satellite_name;
            option.dataset.noradId = s.norad_id;
            dropdownFragment.appendChild(option);
        });
        satelliteSelectDropdown.replaceChildren(dropdownFragment);

        if (filteredTLEs.some(s => s.satellite_name === previousDropdownValue)) {
            satelliteSelectDropdown.value = previousDropdownValue;
        } else {
            satelliteSelectDropdown.value = "None";
            if (currentSelectedSatellite && !filteredTLEs.includes(currentSelectedSatellite)) {
                if (!simParams.showOnlySelectedSatellite) {
                    clearDetailedSatelliteView();
                    currentSelectedSatellite = null;
                    simParams.selectedSatelliteNoradId = null;
                    updateSatelliteInfo(satelliteInfoDiv, null);
                    updateSelectedSatelliteSummary(null);
                    syncSatelliteSearchWithSelection();
                }
            }
        }

        if (satelliteSelectDropdown.value === "None" && detailedSatelliteModel && !simParams.showOnlySelectedSatellite) {
            clearDetailedSatelliteView();
            currentSelectedSatellite = null;
            simParams.selectedSatelliteNoradId = null;
            updateSatelliteInfo(satelliteInfoDiv, null);
            updateSelectedSatelliteSummary(null);
            syncSatelliteSearchWithSelection();
        }

        if (currentSelectedSatellite) {
            setSatelliteSelectToSatellite(currentSelectedSatellite);
        }
        renderSatelliteSearchResults(filteredTLEs, false);

        if (reentryTimelineHandle?.requestRedraw) {
            reentryTimelineHandle.requestRedraw();
        }
    }

    function selectSatelliteSprite(tleSatData) {
        satellites.forEach(s => {
            if (s.mesh && s.isSelected) {
                s.isSelected = false;
                if (s.mesh.visible) {
                    s.mesh.material.color.set(0xffffff);
                    s.mesh.scale.set(...(satelliteConfig.scale || [0.1, 0.1, 0.1]));
                }
            }
        });

        currentSelectedSatellite = tleSatData;

        if (tleSatData?.mesh) {
            simParams.selectedSatelliteNoradId = tleSatData.norad_id?.toString() || null;
            tleSatData.isSelected = true;
            if (tleSatData.mesh.visible) {
                tleSatData.mesh.material.color.set(0xff0000);
                tleSatData.mesh.scale.set(...(satelliteConfig.scale || [0.1, 0.1, 0.1]).map(v => v * 1.5));
            }
            simParams.selectedSatelliteName = tleSatData.satellite_name;
            if (satelliteSelectDropdown) satelliteSelectDropdown.value = tleSatData.satellite_name;
            if (simParams.showOrbit) updateOrbitTrajectory(scene, simParams, tleSatData);
        } else {
            simParams.selectedSatelliteName = "None";
            simParams.selectedSatelliteNoradId = null;
            if (satelliteSelectDropdown) satelliteSelectDropdown.value = "None";
            removeAllGeometry(scene);
        }
        updateSatelliteInfo(satelliteInfoDiv, tleSatData);
        updateSelectedSatelliteSummary(tleSatData);
        if (!tleSatData) syncSatelliteSearchWithSelection();
        if (simParams.showYPR) ensureYPRControlsVisibleForSelection();
    }

    function handleTimelineSelection(tleSatData) {
        if (!tleSatData) return;
        applyOrbitSelectionToUI(ORBIT_FILTER_OPTIONS);
        applyCompanySelectionToUI(DEFAULT_COMPANY_FILTER);
        applyDebrisFilterToUI(DEBRIS_FILTER_SHOW);
        simParams.showOnlySelectedSatellite = false;
        updateSatelliteList();
        if (satelliteSelectDropdown) {
            setSatelliteSelectToSatellite(tleSatData);
            const changeEvent = new Event('change');
            satelliteSelectDropdown.dispatchEvent(changeEvent);
        }
        ensureYPRControlsVisibleForSelection();
    }

    window.addEventListener('keydown', e => {
        if (e.key === 'r') {
            cameraMove = null;
            restoreEarthControlLimits();
            controls.enabled = true;
            controls.reset();
            camera.position.set(...sceneConfig.camera.position);
            controls.target.set(0, 0, 0);
        }
    });

    function formatUTCString(date) {
        const options = {
            weekday: 'short',
            year: 'numeric',
            month: 'long',
            day: '2-digit',
            timeZone: 'UTC',
        };
        const datePart = date.toLocaleDateString('en-US', options);
        const timePart = date.toUTCString().split(' ')[4]; // "HH:MM:SS"
        return `${timePart} UTC  ${datePart}`;
    }

    function animate() {
        requestAnimationFrame(animate);

        /* Camera easing */
        if (cameraMove) {
            const tReal = clock.getElapsedTime();
            const f = Math.min((tReal - cameraMove.startTime) / cameraMove.duration, 1);
            const s = f < 0.5 ? 2 * f * f : 1 - Math.pow(-2 * f + 2, 2) / 2;
            camera.position.lerpVectors(cameraMove.startCamPos, cameraMove.endCamPos, s);
            controls.target.lerpVectors(cameraMove.startTarget, cameraMove.endTarget, s);
            controls.update();
            if (f >= 1) { cameraMove = null; controls.enabled = true; }
        } else {
            controls.update();
        }

        /* Simulation clock: minutes * timeWarp per second */
        const dtReal = clock.getDelta();
        simMillis += dtReal * 1000 * 60 * simParams.timeWarp;
        SIM_DATE.setTime(simMillis);
        simParams.simDate = SIM_DATE; // keep external readers happy

        const jDay = satellite.jday(
            SIM_DATE.getUTCFullYear(), SIM_DATE.getUTCMonth() + 1, SIM_DATE.getUTCDate(),
            SIM_DATE.getUTCHours(), SIM_DATE.getUTCMinutes(), SIM_DATE.getUTCSeconds()
        );
        const gmstNow = satellite.gstime(jDay);
        const rotY = -gmstNow;

        // Update the UTC text ~2 Hz and the slider number immediately (cheap)
        const nowPerf = performance.now();
        if (nowPerf - lastClockUpdate > 500) {
            lastClockUpdate = nowPerf;
            const clockEl = document.getElementById("utcClockDisplay");
            if (clockEl) clockEl.textContent = formatUTCString(SIM_DATE);
        }
        if (timeWarpVal) {
            timeWarpVal.textContent = simParams.timeWarp < 1 ? '0' : `${simParams.timeWarp}`;
        }

        /* Earth rotation */
        if (earthMesh) earthMesh.rotation.y = rotY;
        updateECEFAxesOrientation(rotY);

        /* Visible TLE sprites */
        for (const s of satellites) {
            if (!s.mesh || !s.mesh.visible || !s.satrec) continue;
            const pv = satellite.propagate(s.satrec, SIM_DATE);
            if (!pv || !pv.position) continue;
            eciToSceneVector(s.mesh.position, pv.position);
        }

        /* Detailed model (selected) */
        if (detailedSatelliteModel?.visible && currentSelectedSatellite?.satrec) {
            const pv = satellite.propagate(currentSelectedSatellite.satrec, SIM_DATE);
            if (pv?.position) {
                eciToSceneVector(detailedSatelliteModel.position, pv.position);
                applySelectedSatelliteNadirOrientation();
            }
            if (selectedModelFillLight) {
                selectedModelFillLight.visible = true;
                selectedModelFillLight.position.copy(camera.position);
            }
        } else if (selectedModelFillLight) {
            selectedModelFillLight.visible = false;
        }

        /* LVLH orbit frame (selected) */
        if (simParams.showOrbitFrame && orbitFrame && currentSelectedSatellite?.satrec && currentSelectedSatellite.mesh?.visible) {
            const pv = satellite.propagate(currentSelectedSatellite.satrec, SIM_DATE);
            if (pv?.position && pv?.velocity) {
                updateOrbitFrame(
                    orbitFrame,
                    eciToSceneVector(V_TMP1, pv.position),
                    eciToSceneVector(V_TMP2, pv.velocity)
                );
            }
        }

        /* YPR frame */
        if (simParams.showYPR && yprFrame && currentSelectedSatellite?.satrec) {
            const displayObject = selectedSatelliteDisplayObject();
            if (displayObject) {
                const q = applySelectedSatelliteNadirOrientation();
                if (q) {
                    updateYPRFrameQuaternion(yprFrame, displayObject.position, q);
                } else {
                    updateYPRFrame(yprFrame, displayObject.position, simParams.yawDeg, simParams.pitchDeg, simParams.rollDeg);
                }
            }
        }

        /* Moon controls target */
        if (!cameraMove && controls) {
            if (simParams.otherSelection === 'Moon' && moon) {
                // Unit vector from Earth to Moon.
                V_TMP1.copy(moon.position).normalize();
                const moonRadius = EARTH_SCENE_RADIUS * 0.27;
                const keepDist = Math.max(moonRadius * 4, EARTH_SCENE_RADIUS * 0.6);
                V_TMP2.copy(V_TMP1).multiplyScalar(keepDist).add(moon.position);

                // dt-aware smoothing keeps stable when Time x changes.
                const chaseSmooth = 1 - Math.pow(0.001, dtReal); // fast, stable
                //camera.position.lerp(V_TMP2, chaseSmooth);

                controls.target.copy(moon.position);
                controls.update();
            }
        }

        /* Footprints */
        updateFootprints(currentSelectedSatellite, gmstNow, {
            showFootprint: !!simParams.showFootprint,
            mercatorCtx: null,
            simDate: SIM_DATE
        });

        /* Render 3-D vs Mercator */
        const show3D = simParams.view3D;
        if (renderer) renderer.domElement.style.display = show3D ? 'block' : 'none';
        if (show3D) {
            if (simParams.showOrbit) {
                refreshSelectedOrbitOcclusion(camera, { earthRadiusScene: EARTH_SCENE_RADIUS });
            }
            renderer.render(scene, camera);
            startupPerf.markOnce('first-visible-globe-render');
            update3DLabelsPosition(camera, simParams, rotY);
        } else {
            ['labelXecr','labelYecr','labelZecr','labelNorthPole','labelEquatorLine','labelGreenwichMeridian']
                .forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'none'; });
        }

        if (mercatorContainer) {
            if (simParams.viewMercator) {
                mercatorContainer.style.display = 'block';
                mercatorContainer.classList.toggle('fullscreen', !show3D);
                if (mercatorCanvasElement && mapBackgroundDiv) {
                    const w = mapBackgroundDiv.clientWidth;
                    const h = mapBackgroundDiv.clientHeight;
                    if (mercatorCanvasElement.width !== w || mercatorCanvasElement.height !== h) {
                        mercatorCanvasElement.width = w;
                        mercatorCanvasElement.height = h;
                    }
                    // Throttle Mercator to ~30 FPS
                    if (performance.now() - lastMercatorRedraw > 33) {
                        lastMercatorRedraw = performance.now();
                        updateMercatorMap(simParams);
                        if (simParams.showFootprint) {
                            updateFootprints(currentSelectedSatellite, gmstNow, {
                                showFootprint: true, mercatorCtx, simDate: SIM_DATE
                            });
                        } else {
                            updateFootprints(currentSelectedSatellite, gmstNow, {
                                showFootprint: false, mercatorCtx, simDate: SIM_DATE
                            });
                        }
                        if (simParams.showOrbit && simParams.showFootprint) {
                            drawSelectedGroundTrack(simParams, mercatorCtx);
                        }
                    }
                }
            } else {
                mercatorContainer.style.display = 'none';
            }
        }

        /* Day / Night & Sun */
        if (simParams.showDayNight) {
            drawDayNight3D(scene, earthMesh, SIM_DATE, {
                showSun:  simParams.view3D,
                showHalo: simParams.view3D,
                earthRadius: EARTH_SCENE_RADIUS
            });
        }

        /* Moon */
        if (moon) updateMoon(moon, SIM_DATE);
    }

    function onWindowResize() {
        if (camera && renderer) {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        if (mercatorContainer && mercatorContainer.style.display !== 'none' && mapBackgroundDiv) {
            const w = mapBackgroundDiv.clientWidth;
            const h = mapBackgroundDiv.clientHeight;
            if (mercatorCanvasElement.width !== w || mercatorCanvasElement.height !== h) {
                mercatorCanvasElement.width = w;
                mercatorCanvasElement.height = h;
            }
        }
    }
    window.addEventListener('resize', onWindowResize);

    async function start() {
        try {
            startupPerf.mark('startup-start');
            init3D();
            startupPerf.mark('scene-ready');
            yprFrame = createYPRFrame(scene);
            setYPRVisibility(yprFrame, false);
            initMercatorView();
            initFootprintRenderer(scene, earthMesh, mercatorCtx);
            setupHTMLControls();
            setSatelliteLoadingState('Loading satellites...');
            setTimelineButtonState('launchTimelineToggle', 'Loading satellite data...', true);
            setTimelineButtonState('reentryTimelineToggle', 'Loading satellite data...', true);
            updateECEFAxesVisibility(simParams);
            startupPerf.mark('controls-ready');
            startAnimationLoopOnce();

            startupPerf.mark('tle-load-start');
            await setupTLESatellites(scene, {
                chunkSize: SATELLITE_SETUP_CHUNK_SIZE,
                onProgress: ({ processed, total }) => {
                    if (satelliteCountDisplay) {
                        satelliteCountDisplay.textContent = `Loading ${processed}/${total}`;
                    }
                }
            });
            startupPerf.mark('satellite-data-ready', { count: satellites.length });
            updateSatelliteList();
            startupPerf.markOnce('first-interactive-ui', { count: satellites.length });
            startupPerf.logSummary();
            scheduleDeferredStartupWork();

            if (simParams.showOrbit && currentSelectedSatellite) {
                updateOrbitTrajectory(scene, simParams, currentSelectedSatellite);
            } else {
                simParams.showOrbit = false;
                const t = document.getElementById('showOrbitToggle');
                if (t) t.checked = false;
            }

            startAnimationLoopOnce();
        } catch (e) {
            console.error("Critical error:", e);
        }
    }

    start();
</script>
</body>
</html>
