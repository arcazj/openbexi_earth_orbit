
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: transparent; }
#app { padding: 1rem 0; font-family: var(--font-sans); color: var(--color-text-primary); }
#canvas-wrap { width: 100%; height: 380px; border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); overflow: hidden; background: #0a0a1a; position: relative; }
#viewer { width: 100%; height: 100%; display: block; }
#controls { display: flex; gap: 10px; margin-top: 12px; align-items: center; flex-wrap: wrap; }
#status { font-size: 13px; color: var(--color-text-secondary); flex: 1; }
button { cursor: pointer; border-radius: var(--border-radius-md); font-size: 13px; padding: 7px 16px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); }
button:hover { background: var(--color-background-secondary); }
button.primary { background: #185FA5; color: #fff; border-color: #185FA5; font-weight: 500; }
button.primary:hover { background: #0C447C; }
#legend { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 6px; margin-top: 14px; }
.leg { font-size: 12px; color: var(--color-text-secondary); display: flex; align-items: center; gap: 6px; }
.leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
#loading-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 13px; }
</style>

<div id="app">
  <h2 class="sr-only">Starlink V2 3D model viewer and GLB exporter</h2>
  <div id="canvas-wrap">
    <canvas id="viewer"></canvas>
    <div id="loading-overlay">Loading Three.js…</div>
  </div>
  <div id="controls">
    <span id="status">Drag to rotate · Scroll to zoom</span>
    <button id="btn-anim">Pause rotation</button>
    <button id="btn-export" class="primary" disabled><i class="ti ti-download" aria-hidden="true"></i> Export .glb</button>
  </div>
  <div id="legend">
    <div class="leg"><div class="leg-dot" style="background:#4fc3f7"></div>Main bus (Al chassis)</div>
    <div class="leg"><div class="leg-dot" style="background:#1b5e20"></div>Solar array panels</div>
    <div class="leg"><div class="leg-dot" style="background:#b0bec5"></div>Phased array antenna</div>
    <div class="leg"><div class="leg-dot" style="background:#ffd54f"></div>Ion thrusters</div>
    <div class="leg"><div class="leg-dot" style="background:#ce93d8"></div>Laser inter-sat links</div>
    <div class="leg"><div class="leg-dot" style="background:#ef9a9a"></div>Star trackers</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/GLTFExporter.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
  const canvas = document.getElementById('viewer');
  const overlay = document.getElementById('loading-overlay');
  const statusEl = document.getElementById('status');
  const btnExport = document.getElementById('btn-export');
  const btnAnim = document.getElementById('btn-anim');

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false, preserveDrawingBuffer: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(canvas.parentElement.clientWidth, 380);
  renderer.shadowMap.enabled = true;
  renderer.setClearColor(0x0a0a1a);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, canvas.parentElement.clientWidth / 380, 0.01, 1000);
  camera.position.set(6, 3, 9);

  const controls = new THREE.OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 3;
  controls.maxDistance = 30;

  // Lighting
  const amb = new THREE.AmbientLight(0xffffff, 0.25);
  scene.add(amb);
  const sun = new THREE.DirectionalLight(0xfff8e1, 1.8);
  sun.position.set(10, 8, 5);
  sun.castShadow = true;
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0x4fc3f7, 0.4);
  fill.position.set(-8, -4, -6);
  scene.add(fill);

  // Stars
  const starGeo = new THREE.BufferGeometry();
  const starVerts = [];
  for (let i = 0; i < 1200; i++) {
    starVerts.push((Math.random() - 0.5) * 200, (Math.random() - 0.5) * 200, (Math.random() - 0.5) * 200);
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.18 })));

  // ── Materials ──
  const mat = (color, rough = 0.45, metal = 0.6) =>
    new THREE.MeshStandardMaterial({ color, roughness: rough, metalness: metal });

  const mBus     = mat(0x4fc3f7, 0.35, 0.75);
  const mSolar   = mat(0x1b5e20, 0.8, 0.1);
  const mSolarFr = mat(0x2e7d32, 0.75, 0.15);
  const mAntenna = mat(0xb0bec5, 0.3, 0.85);
  const mThruster= mat(0xffd54f, 0.5, 0.6);
  const mLaser   = mat(0xce93d8, 0.25, 0.8);
  const mTracker = mat(0xef9a9a, 0.4, 0.6);
  const mPanel   = mat(0x263238, 0.9, 0.05);
  const mStrut   = mat(0x78909c, 0.4, 0.7);
  const mHinge   = mat(0x546e7a, 0.5, 0.8);

  const satelliteGroup = new THREE.Group();
  scene.add(satelliteGroup);

  function box(w, h, d, m, x=0, y=0, z=0, rx=0, ry=0, rz=0) {
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), m);
    mesh.position.set(x, y, z);
    mesh.rotation.set(rx, ry, rz);
    mesh.castShadow = true;
    satelliteGroup.add(mesh);
    return mesh;
  }
  function cyl(rt, rb, h, seg, m, x=0, y=0, z=0, rx=0, ry=0, rz=0) {
    const mesh = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, seg), m);
    mesh.position.set(x, y, z);
    mesh.rotation.set(rx, ry, rz);
    mesh.castShadow = true;
    satelliteGroup.add(mesh);
    return mesh;
  }

  // ── Main bus ── 4.1m × 0.28m × 1.0m
  box(4.1, 0.28, 1.0, mBus);

  // Bus internal ribs (structural detail)
  for (let i = -1.5; i <= 1.5; i += 0.75) {
    box(0.03, 0.25, 0.95, mStrut, i, 0, 0);
  }

  // ── Top face — Ku/Ka phased array antennas ──
  // 3 large antenna tiles on top
  for (let ax = -1.2; ax <= 1.2; ax += 1.2) {
    box(1.0, 0.04, 0.85, mAntenna, ax, 0.16, 0);
    // Antenna grid lines
    for (let gx = -0.4; gx <= 0.4; gx += 0.2) {
      box(0.008, 0.05, 0.82, mat(0x90a4ae, 0.3, 0.9), ax + gx, 0.17, 0);
    }
  }

  // ── Bottom face — E-band array + radiator panels ──
  box(3.8, 0.03, 0.92, mat(0x37474f, 0.6, 0.3), 0, -0.155, 0);
  // Radiator fins
  for (let rx2 = -1.6; rx2 <= 1.6; rx2 += 0.32) {
    box(0.015, 0.06, 0.9, mat(0x607d8b, 0.4, 0.8), rx2, -0.2, 0);
  }

  // ── Solar array deployment struts ──
  // Left wing strut + hinge
  box(0.06, 0.06, 0.06, mHinge, -2.1, 0.05, 0);
  box(2.5, 0.04, 0.04, mStrut, -3.35, 0.05, 0.45);
  box(2.5, 0.04, 0.04, mStrut, -3.35, 0.05, -0.45);
  box(2.5, 0.04, 0.04, mStrut, -3.35, 0.05, 0);
  // Right wing strut + hinge
  box(0.06, 0.06, 0.06, mHinge, 2.1, 0.05, 0);
  box(2.5, 0.04, 0.04, mStrut, 3.35, 0.05, 0.45);
  box(2.5, 0.04, 0.04, mStrut, 3.35, 0.05, -0.45);
  box(2.5, 0.04, 0.04, mStrut, 3.35, 0.05, 0);

  // ── Solar panels — left wing (2 panels) ──
  // Panel 1
  box(2.3, 0.015, 1.6, mSolar, -3.25, 0.06, 0);
  // Solar cells grid (front face detail)
  for (let scx = 0; scx < 6; scx++) {
    for (let scz = 0; scz < 4; scz++) {
      box(0.33, 0.02, 0.34, mat(scx % 2 === 0 ? 0x1a237e : 0x283593, 0.85, 0.05),
        -4.3 + scx * 0.37, 0.075, -0.7 + scz * 0.38);
    }
  }
  // Panel 2
  box(2.3, 0.015, 1.6, mSolar, -5.85, 0.06, 0);
  for (let scx = 0; scx < 6; scx++) {
    for (let scz = 0; scz < 4; scz++) {
      box(0.33, 0.02, 0.34, mat(scx % 2 === 0 ? 0x1a237e : 0x283593, 0.85, 0.05),
        -6.9 + scx * 0.37, 0.075, -0.7 + scz * 0.38);
    }
  }
  // Panel border frames
  box(2.35, 0.025, 0.025, mStrut, -3.25, 0.06, 0.81);
  box(2.35, 0.025, 0.025, mStrut, -3.25, 0.06, -0.81);
  box(2.35, 0.025, 0.025, mStrut, -5.85, 0.06, 0.81);
  box(2.35, 0.025, 0.025, mStrut, -5.85, 0.06, -0.81);

  // ── Solar panels — right wing ──
  box(2.3, 0.015, 1.6, mSolar, 3.25, 0.06, 0);
  for (let scx = 0; scx < 6; scx++) {
    for (let scz = 0; scz < 4; scz++) {
      box(0.33, 0.02, 0.34, mat(scx % 2 === 0 ? 0x1a237e : 0x283593, 0.85, 0.05),
        2.2 + scx * 0.37, 0.075, -0.7 + scz * 0.38);
    }
  }
  box(2.3, 0.015, 1.6, mSolar, 5.85, 0.06, 0);
  for (let scx = 0; scx < 6; scx++) {
    for (let scz = 0; scz < 4; scz++) {
      box(0.33, 0.02, 0.34, mat(scx % 2 === 0 ? 0x1a237e : 0x283593, 0.85, 0.05),
        4.78 + scx * 0.37, 0.075, -0.7 + scz * 0.38);
    }
  }
  box(2.35, 0.025, 0.025, mStrut, 3.25, 0.06, 0.81);
  box(2.35, 0.025, 0.025, mStrut, 3.25, 0.06, -0.81);
  box(2.35, 0.025, 0.025, mStrut, 5.85, 0.06, 0.81);
  box(2.35, 0.025, 0.025, mStrut, 5.85, 0.06, -0.81);

  // ── Argon ion thrusters (4 units, aft end) ──
  for (let tz = -0.35; tz <= 0.35; tz += 0.7) {
    const tg = new THREE.Group();
    // Nozzle bell
    const bell = new THREE.Mesh(new THREE.CylinderGeometry(0.065, 0.04, 0.14, 12), mThruster);
    bell.rotation.z = Math.PI / 2;
    bell.position.set(-2.1, -0.06, tz);
    bell.castShadow = true;
    satelliteGroup.add(bell);
    // Thruster body
    cyl(0.04, 0.04, 0.08, 10, mat(0x78909c, 0.4, 0.8), -2.0, -0.06, tz, 0, 0, Math.PI/2);
    // Exhaust glow ring
    const ring = new THREE.Mesh(new THREE.TorusGeometry(0.055, 0.008, 8, 20), mat(0x80d8ff, 0.2, 0.9));
    ring.rotation.y = Math.PI / 2;
    ring.position.set(-2.16, -0.06, tz);
    satelliteGroup.add(ring);
  }

  // ── Laser inter-satellite link terminals (4 corners) ──
  const laserPositions = [
    [-1.8, 0.18, 0.45], [1.8, 0.18, 0.45],
    [-1.8, 0.18, -0.45], [1.8, 0.18, -0.45]
  ];
  laserPositions.forEach(([lx, ly, lz]) => {
    cyl(0.045, 0.045, 0.12, 8, mLaser, lx, ly, lz);
    const dome = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 6, 0, Math.PI * 2, 0, Math.PI / 2), mat(0xe1bee7, 0.15, 0.9));
    dome.position.set(lx, ly + 0.07, lz);
    satelliteGroup.add(dome);
  });

  // ── Star trackers (2 units, nadir face) ──
  [[-0.9, -0.16, 0], [0.9, -0.16, 0]].forEach(([sx, sy, sz]) => {
    cyl(0.05, 0.05, 0.09, 8, mTracker, sx, sy, sz);
    const lens = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 6), mat(0x1a1a2e, 0.05, 0.3));
    lens.position.set(sx, sy - 0.065, sz);
    satelliteGroup.add(lens);
  });

  // ── GPS antenna (small patch, zenith face) ──
  box(0.18, 0.02, 0.18, mat(0xf5f5f5, 0.4, 0.3), 0, 0.16, -0.3);

  // ── Magnetorquers (attitude control rods, 3 axes) ──
  cyl(0.012, 0.012, 0.55, 6, mat(0xa5d6a7, 0.5, 0.6), 0, 0.0, 0.38);
  cyl(0.012, 0.012, 0.55, 6, mat(0xa5d6a7, 0.5, 0.6), 0.3, 0.0, 0.0, 0, 0, Math.PI/2);

  // ── Thermal blanket detail (MLI edges) ──
  box(4.08, 0.01, 0.02, mat(0xffe082, 0.9, 0.05), 0, 0.0, 0.51);
  box(4.08, 0.01, 0.02, mat(0xffe082, 0.9, 0.05), 0, 0.0, -0.51);
  box(0.02, 0.28, 1.0, mat(0xffe082, 0.9, 0.05), -2.06, 0, 0);
  box(0.02, 0.28, 1.0, mat(0xffe082, 0.9, 0.05), 2.06, 0, 0);

  // ── Propellant tank detail (argon pressure vessel) ──
  const sphere1 = new THREE.Mesh(new THREE.SphereGeometry(0.12, 12, 10), mat(0x90a4ae, 0.3, 0.85));
  sphere1.position.set(1.4, 0, 0.25);
  satelliteGroup.add(sphere1);
  const sphere2 = new THREE.Mesh(new THREE.SphereGeometry(0.12, 12, 10), mat(0x90a4ae, 0.3, 0.85));
  sphere2.position.set(-1.4, 0, 0.25);
  satelliteGroup.add(sphere2);

  // ── Plumbing lines ──
  for (let px = -1.4; px <= 1.4; px += 2.8) {
    cyl(0.008, 0.008, 0.6, 5, mat(0x78909c, 0.5, 0.7), px, 0, 0, 0, 0, Math.PI/2);
  }

  overlay.style.display = 'none';
  btnExport.disabled = false;

  // ── Animate ──
  let rotating = true;
  let raf;
  function animate() {
    raf = requestAnimationFrame(animate);
    if (rotating) satelliteGroup.rotation.y += 0.003;
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  btnAnim.addEventListener('click', () => {
    rotating = !rotating;
    btnAnim.textContent = rotating ? 'Pause rotation' : 'Resume rotation';
  });

  window.addEventListener('resize', () => {
    const w = canvas.parentElement.clientWidth;
    renderer.setSize(w, 380);
    camera.aspect = w / 380;
    camera.updateProjectionMatrix();
  });

  // ── GLB Export ──
  btnExport.addEventListener('click', () => {
    btnExport.textContent = 'Exporting…';
    btnExport.disabled = true;
    statusEl.textContent = 'Building GLB — this may take a moment…';

    const exporter = new THREE.GLTFExporter();
    exporter.parse(satelliteGroup, (result) => {
      const blob = new Blob([result], { type: 'model/gltf-binary' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'starlink_v2_satellite.glb';
      a.click();
      URL.revokeObjectURL(url);
      btnExport.innerHTML = '<i class="ti ti-download" aria-hidden="true"></i> Export .glb';
      btnExport.disabled = false;
      statusEl.textContent = 'Download started — open in Blender, Three.js, or any GLTF viewer';
    }, { binary: true });
  });
})();
</script>
