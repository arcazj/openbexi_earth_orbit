<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Model Viewer</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at 50% 35%, #263a56 0%, #0a101a 55%, #020409 100%);
            color: #e8f1ff;
            font-family: "Segoe UI", sans-serif;
        }

        canvas {
            display: block;
        }

        #panel {
            position: fixed;
            left: 16px;
            top: 16px;
            width: min(560px, calc(100vw - 32px));
            padding: 14px;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 12px;
            background: rgba(4, 10, 18, 0.76);
            box-shadow: 0 10px 35px rgba(0,0,0,0.35);
            backdrop-filter: blur(8px);
            font-size: 14px;
            line-height: 1.45;
            box-sizing: border-box;
        }

        #panel strong {
            color: #ffffff;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            margin: 10px 0;
        }

        .custom-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            margin: 8px 0 10px;
        }

        select,
        input,
        button {
            min-height: 34px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.08);
            color: #eef5ff;
            padding: 0 10px;
            font: inherit;
        }

        select option {
            color: #111827;
            background: #ffffff;
        }

        button {
            cursor: pointer;
            background: #8cc8ff;
            color: #07111f;
            border: none;
            font-weight: 700;
        }

        button:hover {
            background: #b4dcff;
        }

        code {
            color: #b9ddff;
        }

        #status {
            margin-top: 8px;
        }

        .hint {
            color: #b9c9dc;
            font-size: 12px;
        }

        @media (max-width: 560px) {
            .controls,
            .custom-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.184.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.184.0/examples/jsm/"
          }
        }
    </script>
</head>
<body>
<div id="panel">
    <strong>Satellite model viewer</strong>
    <div class="controls">
        <select id="modelSelect" aria-label="Satellite model"></select>
        <button id="reloadBtn" type="button">Reload</button>
    </div>
    <div class="custom-row">
        <input id="customModelInput" type="text" placeholder="Custom: starlink_V1, oneweb.obj, ISS.glb">
        <button id="loadCustomBtn" type="button">Load Custom</button>
    </div>
    <div class="hint">
        Loads local models from <code>./obj</code>. OBJ entries try the matching MTL first; GLB entries use GLTFLoader.
    </div>
    <div id="status">Loading default <code>obj/starlink_V1.obj</code>...</div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

    const OBJ_BASE = 'obj/';
    const DEFAULT_MODEL_ID = 'starlink_V1';
    const MODEL_CATALOG = Object.freeze([
        { id: 'starlink_V1', label: 'Starlink V1 (OBJ/MTL)', kind: 'obj-mtl', obj: 'starlink_V1.obj', mtl: 'starlink_V1.mtl' },
        { id: 'starlink_spacex_satellite.glb', label: 'Starlink SpaceX Satellite (GLB)', kind: 'glb', file: 'starlink_spacex_satellite.glb' },
        { id: 'oneweb', label: 'OneWeb (OBJ/MTL)', kind: 'obj-mtl', obj: 'oneweb.obj', mtl: 'oneweb.mtl' },
        { id: 'o3b', label: 'O3b (OBJ/MTL)', kind: 'obj-mtl', obj: 'o3b.obj', mtl: 'o3b.mtl' },
        { id: 'o3b.glb', label: 'O3b (GLB)', kind: 'glb', file: 'o3b.glb' },
        { id: 'ISS.glb', label: 'ISS (GLB)', kind: 'glb', file: 'ISS.glb' },
        { id: 'international_space_station_iss.glb', label: 'International Space Station ISS (GLB)', kind: 'glb', file: 'international_space_station_iss.glb' },
        { id: 'SSL_1300.glb', label: 'SSL 1300 (GLB)', kind: 'glb', file: 'SSL_1300.glb' },
        { id: 'Aqua.glb', label: 'Aqua (GLB)', kind: 'glb', file: 'Aqua.glb' },
        { id: 'Aura.glb', label: 'Aura (GLB)', kind: 'glb', file: 'Aura.glb' },
        { id: 'Landsat8.glb', label: 'Landsat 8 (GLB)', kind: 'glb', file: 'Landsat8.glb' },
        { id: 'Landsat4and5.glb', label: 'Landsat 4/5 (GLB)', kind: 'glb', file: 'Landsat4and5.glb' },
        {
            id: 'Cloud-Aerosol Lidar and Infrared Pathfinder Satellite (CALIPSO).glb',
            label: 'CALIPSO (GLB)',
            kind: 'glb',
            file: 'Cloud-Aerosol Lidar and Infrared Pathfinder Satellite (CALIPSO).glb'
        }
    ]);

    const status = document.getElementById('status');
    const modelSelect = document.getElementById('modelSelect');
    const reloadBtn = document.getElementById('reloadBtn');
    const customModelInput = document.getElementById('customModelInput');
    const loadCustomBtn = document.getElementById('loadCustomBtn');
    const scene = new THREE.Scene();
    let currentModel = null;

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.001, 1000);
    camera.position.set(0, 1.2, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.HemisphereLight(0xddeaff, 0x1c2636, 1.8));
    const keyLight = new THREE.DirectionalLight(0xffffff, 2.8);
    keyLight.position.set(4, 5, 6);
    scene.add(keyLight);
    const fillLight = new THREE.DirectionalLight(0x9ec8ff, 1.5);
    fillLight.position.set(-4, 2, -3);
    scene.add(fillLight);

    const axesHelper = new THREE.AxesHelper(1);
    axesHelper.visible = true;
    scene.add(axesHelper);

    function setStatus(message) {
        status.innerHTML = message;
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    function stripObjPrefix(value) {
        return String(value || '').trim().replace(/^\.?\/?obj\//i, '');
    }

    function stripExtension(value) {
        return String(value || '').replace(/\.[^.]+$/, '');
    }

    function catalogEntryFromCustom(value) {
        const cleaned = stripObjPrefix(value);
        if (!cleaned) return null;

        if (/\.glb$/i.test(cleaned)) {
            return {
                id: cleaned,
                label: `${cleaned} (custom GLB)`,
                kind: 'glb',
                file: cleaned,
                custom: true
            };
        }

        const objName = /\.obj$/i.test(cleaned) ? cleaned : `${stripExtension(cleaned)}.obj`;
        const base = stripExtension(objName);
        return {
            id: base,
            label: `${objName} (custom OBJ/MTL)`,
            kind: 'obj-mtl',
            obj: objName,
            mtl: `${base}.mtl`,
            custom: true
        };
    }

    function modelUrl(entry) {
        if (entry.kind === 'glb') return `${OBJ_BASE}${entry.file}`;
        return `${OBJ_BASE}${entry.obj}`;
    }

    function populateModelSelect() {
        modelSelect.innerHTML = '';
        MODEL_CATALOG.forEach(entry => {
            const option = document.createElement('option');
            option.value = entry.id;
            option.textContent = entry.label;
            modelSelect.appendChild(option);
        });
    }

    function findCatalogEntry(id) {
        return MODEL_CATALOG.find(entry => entry.id === id) || MODEL_CATALOG[0];
    }

    function materialColorLooksBlack(material) {
        const color = material?.color;
        if (!color) return false;
        if ([color.r, color.g, color.b].every(value => Number.isFinite(value))) {
            return color.r <= 0.02 && color.g <= 0.02 && color.b <= 0.02;
        }
        return false;
    }

    function makeMaterialVisible(material) {
        if (!material) {
            return new THREE.MeshStandardMaterial({
                color: 0xcfd8ff,
                metalness: 0.2,
                roughness: 0.5,
                side: THREE.DoubleSide
            });
        }
        material.visible = true;
        material.side = THREE.DoubleSide;
        if (Number.isFinite(material.opacity) && material.opacity <= 0.05) {
            material.opacity = 1;
            material.transparent = false;
        }
        if (!material.map && material.color?.set && materialColorLooksBlack(material)) {
            material.color.set(0xcfd8ff);
        }
        material.needsUpdate = true;
        return material;
    }

    function prepareObject(root) {
        let meshCount = 0;
        root.visible = true;
        root.frustumCulled = false;
        root.traverse(child => {
            if (!child.isMesh) return;
            meshCount += 1;
            child.visible = true;
            child.frustumCulled = false;
            child.castShadow = true;
            child.receiveShadow = true;
            child.material = Array.isArray(child.material)
                ? child.material.map(makeMaterialVisible)
                : makeMaterialVisible(child.material);
        });
        return meshCount;
    }

    function disposeMaterial(material) {
        if (!material) return;
        Object.keys(material).forEach(key => {
            const value = material[key];
            if (value?.isTexture) value.dispose();
        });
        material.dispose?.();
    }

    function disposeObject(root) {
        root?.traverse(child => {
            if (child.geometry) child.geometry.dispose?.();
            if (Array.isArray(child.material)) {
                child.material.forEach(disposeMaterial);
            } else {
                disposeMaterial(child.material);
            }
        });
    }

    function clearCurrentModel() {
        if (!currentModel) return;
        scene.remove(currentModel);
        disposeObject(currentModel);
        currentModel = null;
    }

    function fitCameraToObject(root) {
        const box = new THREE.Box3().setFromObject(root);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        root.position.sub(center);
        const diameter = Math.max(size.x || 0, size.y || 0, size.z || 0);
        const safeDiameter = Number.isFinite(diameter) && diameter > 0 ? diameter : 1;
        const distance = Math.max(safeDiameter * 1.7, 2);

        axesHelper.scale.setScalar(Math.max(safeDiameter * 0.25, 0.5));
        camera.near = Math.max(distance / 10000, 0.0001);
        camera.far = distance * 100;
        camera.updateProjectionMatrix();
        camera.position.set(0, safeDiameter * 0.25, distance);
        controls.target.set(0, 0, 0);
        controls.update();

        return { diameter: safeDiameter, size };
    }

    async function loadObjMtl(entry) {
        const mtlLoader = new MTLLoader();
        mtlLoader.setPath(OBJ_BASE);
        mtlLoader.setResourcePath(OBJ_BASE);

        let materials = null;
        try {
            materials = await mtlLoader.loadAsync(entry.mtl);
            materials.preload();
        } catch (error) {
            console.warn(`MTL load failed for ${OBJ_BASE}${entry.mtl}; loading OBJ with fallback material.`, error);
        }

        const objLoader = new OBJLoader();
        objLoader.setPath(OBJ_BASE);
        if (materials) objLoader.setMaterials(materials);
        return objLoader.loadAsync(entry.obj);
    }

    async function loadGlb(entry) {
        const loader = new GLTFLoader();
        loader.setPath(OBJ_BASE);
        const gltf = await loader.loadAsync(entry.file);
        return gltf.scene || gltf.scenes?.[0] || new THREE.Group();
    }

    async function loadModel(entry) {
        clearCurrentModel();
        const url = modelUrl(entry);
        setStatus(`Loading <code>${escapeHtml(url)}</code>...`);

        const root = entry.kind === 'glb'
            ? await loadGlb(entry)
            : await loadObjMtl(entry);

        const meshCount = prepareObject(root);
        currentModel = root;
        scene.add(currentModel);
        const metrics = fitCameraToObject(currentModel);

        const materialNote = entry.kind === 'obj-mtl'
            ? `<br>MTL attempted: <code>${escapeHtml(`${OBJ_BASE}${entry.mtl}`)}</code>`
            : '';
        setStatus(
            `Loaded <code>${escapeHtml(url)}</code>.${materialNote}<br>`
            + `Meshes: <code>${meshCount}</code>. `
            + `Bounding diameter: <code>${metrics.diameter.toFixed(3)}</code> model units.<br>`
            + `Use mouse orbit/zoom/pan to inspect the model.`
        );

        const params = new URLSearchParams(window.location.search);
        params.set('model', entry.id);
        history.replaceState(null, '', `${window.location.pathname}?${params.toString()}`);
    }

    function loadSelectedModel() {
        const entry = findCatalogEntry(modelSelect.value);
        loadModel(entry).catch(error => {
            console.error(error);
            setStatus(
                `Failed to load <code>${escapeHtml(modelUrl(entry))}</code>. `
                + `Check the file exists under <code>./obj</code> and serve over HTTP.<br>`
                + `<code>${escapeHtml(error.message)}</code>`
            );
        });
    }

    function loadCustomModel() {
        const entry = catalogEntryFromCustom(customModelInput.value);
        if (!entry) {
            setStatus('Enter a custom model name such as <code>ISS.glb</code>, <code>oneweb.obj</code>, or <code>starlink_V1</code>.');
            return;
        }
        loadModel(entry).catch(error => {
            console.error(error);
            setStatus(
                `Failed to load custom <code>${escapeHtml(modelUrl(entry))}</code>. `
                + `Check the file exists under <code>./obj</code> and serve over HTTP.<br>`
                + `<code>${escapeHtml(error.message)}</code>`
            );
        });
    }

    populateModelSelect();
    const requestedModel = new URLSearchParams(window.location.search).get('model') || DEFAULT_MODEL_ID;
    const initialEntry = MODEL_CATALOG.find(entry => entry.id === requestedModel)
        || catalogEntryFromCustom(requestedModel)
        || findCatalogEntry(DEFAULT_MODEL_ID);
    if (MODEL_CATALOG.some(entry => entry.id === initialEntry.id)) {
        modelSelect.value = initialEntry.id;
    } else {
        customModelInput.value = initialEntry.id;
    }

    reloadBtn.addEventListener('click', loadSelectedModel);
    modelSelect.addEventListener('change', loadSelectedModel);
    loadCustomBtn.addEventListener('click', loadCustomModel);
    customModelInput.addEventListener('keydown', event => {
        if (event.key === 'Enter') loadCustomModel();
    });

    loadModel(initialEntry).catch(error => {
        console.error(error);
        setStatus(`Failed to load default model. Check console and local HTTP server.<br><code>${escapeHtml(error.message)}</code>`);
    });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
